<!doctype html>
<html lang="ko">
<head>
<link rel="manifest" href="/manifest.json">
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
  <title>Chat</title>
  <style>
    :root{
      --bg:#f3f4f6; --card:#ffffff; --text:#111827; --muted:#6b7280; --line:#e5e7eb;
      --me:#374151; --meText:#ffffff; --other:#ffffff; --otherText:#111827;
      --accent:#22c55e; --danger:#ef4444;
      --safeB: env(safe-area-inset-bottom, 0px); --safeBComp: var(--safeB);
      --safeT: env(safe-area-inset-top, 0px); --kb: 0px; --kbFix: 40px;
      --appH: 100dvh; --composerH: 64px; --typingH: 34px;
      --shadow: 0 10px 30px rgba(0,0,0,0.06); --shadow2: 0 14px 40px rgba(0,0,0,0.12);
    }
    *{ box-sizing:border-box; }
    html, body{
      height:100%; margin:0; background:var(--bg); color:var(--text);
      font-family:-apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; overflow:hidden;
    }
    button, .clickable{ -webkit-tap-highlight-color:transparent; touch-action:manipulation; cursor:pointer; transition:transform .08s ease, box-shadow .18s ease; }
    button:active, .clickable:active{ transform:translateY(1px) scale(0.99); }
    .app{ height:var(--appH,100dvh); display:flex; flex-direction:column; min-height:0; overflow:hidden; padding-top:var(--safeT); background:var(--bg); transform:translateZ(0); }
    header{ position:sticky; top:0; z-index:10; padding:12px 14px 10px; border-bottom:1px solid var(--line); background:rgba(255,255,255,0.92); backdrop-filter:blur(12px); }
    .headTop{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .title{ font-size:16px; font-weight:800; margin:0; line-height:1.2; }
    .sub{ margin-top:6px; font-size:12px; color:var(--muted); display:flex; gap:10px; flex-wrap:wrap; }
    .pill{ display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:999px; border:1px solid var(--line); background:#fff; font-size:12px; color:var(--muted); }
    .menuWrap{ position:relative; display:flex; align-items:center; gap:8px; }
    .menuBtn{ width:40px; height:40px; border-radius:12px; border:1px solid var(--line); background:#fff; display:flex; align-items:center; justify-content:center; font-size:22px; line-height:1; user-select:none; box-shadow:0 6px 18px rgba(0,0,0,0.06); }
    .menu{ position:absolute; right:0; top:46px; min-width:280px; background:#fff; border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow2); overflow:hidden; display:none; z-index:100; }
    .menu.open{ display:block; }
    .menu button{ width:100%; padding:12px; border:0; background:#fff; text-align:left; font-size:14px; display:flex; justify-content:space-between; align-items:center; }
    .menu button:hover{ background:#f8fafc; }
    .menu .hint{ font-size:12px; color:var(--muted); padding:10px 12px; border-top:1px solid var(--line); line-height:1.35; white-space:pre-wrap; }
    .home{ flex:1; min-height:0; overflow:auto; padding:16px; -webkit-overflow-scrolling:touch; }
    .homeCard{ width:100%; max-width:720px; margin:0 auto; background:#fff; border:1px solid var(--line); border-radius:18px; padding:16px; box-shadow:var(--shadow); }
    .homeTitle{ font-weight:900; font-size:18px; margin:0 0 10px; }
    .sectionTitle{ font-size:12px; color:var(--muted); font-weight:800; margin:14px 0 8px; }
    .field{ display:flex; flex-direction:column; gap:8px; margin:10px 0; }
    .field label{ font-size:12px; color:var(--muted); }
    .field input{ height:46px; border-radius:14px; border:1px solid var(--line); padding:0 12px; font-size:16px; outline:none; }
    .rowBtns{ display:flex; gap:10px; margin-top:10px; }
    .primaryBtn{ flex:1; height:46px; border-radius:14px; border:0; background:#111827; color:#fff; font-size:15px; font-weight:900; box-shadow:0 10px 18px rgba(17,24,39,0.14); }
    .ghostBtn{ flex:1; height:46px; border-radius:14px; border:1px solid var(--line); background:#fff; color:#111827; font-size:15px; font-weight:800; }
    .roomList{ display:flex; flex-direction:column; gap:10px; }
    .roomItem{ border:1px solid var(--line); border-radius:16px; padding:12px; background:#fff; box-shadow:0 6px 18px rgba(0,0,0,0.04); display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .log{ flex:1; min-height:0; overflow:auto; padding:12px 12px calc(var(--composerH) + var(--typingH) + 20px) 12px; -webkit-overflow-scrolling:touch; position:relative; }
    .msg{ display:flex; flex-direction:column; gap:4px; margin:10px 0; width:100%; }
    .row{ display:flex; gap:8px; width:100%; }
    .row.me{ justify-content:flex-end; }
    .bubble{ max-width:82%; padding:12px; border-radius:16px; border:1px solid var(--line); background:var(--other); color:var(--otherText); white-space:pre-wrap; word-break:break-word; font-size:16px; line-height:1.35; }
    .row.me .bubble{ background:var(--me); color:var(--meText); border-color:transparent; border-bottom-right-radius:6px; }
    .row.other .bubble{ border-bottom-left-radius:6px; }
    .meta{ font-size:11px; color:var(--muted); display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .meta.me{ justify-content:flex-end; }
    .readBadge{ font-weight:900; color:var(--accent); font-size:11px; }
    .typingBar{ position:fixed; left:0; right:0; bottom:calc(var(--composerH) + max(0px,calc(var(--kb) + var(--safeBComp) - var(--kbFix)))); height:var(--typingH); display:none; align-items:center; padding:0 12px; font-size:12px; color:var(--muted); background:rgba(255,255,255,0.95); backdrop-filter:blur(12px); border-top:1px solid var(--line); z-index:19; }
    .composer{ position:fixed; left:0; right:0; bottom:max(0px,calc(var(--kb) + var(--safeBComp) - var(--kbFix))); height:var(--composerH); padding:10px 12px; border-top:1px solid var(--line); background:rgba(255,255,255,0.95); backdrop-filter:blur(12px); display:flex; gap:10px; align-items:center; z-index:20; }
    .emojiBtn{ width:48px; height:48px; border-radius:14px; border:1px solid var(--line); background:#fff; font-size:22px; display:flex; align-items:center; justify-content:center; user-select:none; flex-shrink:0; }
    .inputWrap{ flex:1; height:48px; border-radius:14px; border:1px solid var(--line); background:#fff; display:flex; align-items:center; padding:0 12px; min-width:0; }
    input[type="text"]{ width:100%; border:0; outline:none; font-size:16px; background:transparent; }
    .sendBtn{ width:64px; height:48px; border-radius:14px; border:0; background:#111827; color:#fff; font-size:15px; font-weight:900; flex-shrink:0; }
    .sendBtn:disabled{ opacity:0.45; }
    .emojiPanel{ position:fixed; left:12px; right:12px; bottom:calc(var(--composerH) + max(0px,calc(var(--kb) + var(--safeBComp) - var(--kbFix))) + 10px); background:#fff; border:1px solid var(--line); border-radius:16px; padding:10px; box-shadow:var(--shadow); display:none; z-index:30; }
    .emojiPanel.open{ display:block; }
    .emojiGrid{ display:grid; grid-template-columns:repeat(8,1fr); gap:8px; }
    .emoji{ height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:22px; user-select:none; cursor:pointer; }
    .emoji:active{ background:#f3f4f6; }
    .modalOverlay{ position:fixed; inset:0; background:rgba(0,0,0,0.45); display:none; align-items:center; justify-content:center; padding:16px; z-index:50; }
    .modalOverlay.open{ display:flex; }
    .modalCard{ width:100%; max-width:420px; background:#fff; border:1px solid var(--line); border-radius:18px; padding:20px; display:flex; flex-direction:column; gap:12px; }
    .modalTitle{ font-size:16px; font-weight:800; margin:0; }
    .modalBtnsRow{ display:flex; gap:10px; margin-top:4px; }
    .passInput{ height:46px; border-radius:14px; border:1px solid var(--line); padding:0 12px; font-size:16px; outline:none; width:100%; }
    .msgCtxMenu{ position:fixed; background:#fff; border:1px solid var(--line); border-radius:14px; box-shadow:0 14px 40px rgba(0,0,0,0.14); overflow:hidden; z-index:200; min-width:160px; display:none; }
    .msgCtxMenu.open{ display:block; }
    .msgCtxMenu button{ width:100%; padding:11px 14px; border:0; background:#fff; text-align:left; font-size:14px; display:flex; align-items:center; gap:10px; }
    .msgCtxMenu button:hover{ background:#f8fafc; }
    .msgCtxMenu button.danger{ color:var(--danger); }
    .quickReact{ display:flex; gap:4px; padding:8px 10px; border-bottom:1px solid var(--line); flex-wrap:wrap; }
    .quickReact span{ font-size:20px; cursor:pointer; padding:2px 4px; border-radius:8px; transition:transform .1s; }
    .quickReact span:active{ transform:scale(1.3); }
    .deletedBubble{ font-style:italic; color:var(--muted); font-size:13px; }
    .reactChip{ display:inline-flex; align-items:center; gap:3px; padding:2px 8px; border-radius:999px; border:1px solid var(--line); background:#fff; font-size:13px; cursor:pointer; user-select:none; margin-top:4px; }
    .reactChip.mine{ background:#f0fdf4; border-color:var(--accent); }
    .reactRow{ display:flex; flex-wrap:wrap; gap:4px; padding:2px 0; }
    .replyPreview{ position:absolute; bottom:100%; left:0; right:0; background:rgba(255,255,255,0.97); border-top:1px solid var(--line); padding:8px 12px; display:none; align-items:center; gap:8px; font-size:12px; z-index:21; }
    .replyQuote{ border-left:3px solid var(--accent); padding:5px 10px; background:rgba(34,197,94,0.07); margin-bottom:6px; font-size:12px; cursor:pointer; border-radius:4px; }
    .toast{ position:fixed; bottom:calc(var(--composerH) + 20px); left:50%; transform:translateX(-50%) translateY(20px); background:#111827; color:#fff; padding:9px 18px; border-radius:999px; font-size:13px; opacity:0; transition:all .2s; z-index:400; pointer-events:none; white-space:nowrap; }
    .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
    .loadMoreBtn{ display:block; width:100%; padding:10px; border:1px solid var(--line); border-radius:14px; background:#fff; font-size:13px; color:var(--muted); text-align:center; margin-bottom:10px; cursor:pointer; }
    #readSentinel{ height:1px; width:100%; pointer-events:none; margin-top:10px; }
  </style>

<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({ appId: "90c2ab9b-c948-4b4d-8f1e-56326f9b7aea" });
    window._OS = window.__OS = OneSignal;
    try {
      OneSignal.User.PushSubscription.addEventListener("change", () => window.__schedulePushSync && window.__schedulePushSync());
      window.__schedulePushSync && window.__schedulePushSync();

  });
</script>
</head>
<body>
  <div class="app" id="app">
    <header id="header" style="display:none;">
      <div class="headTop">
        <div><div class="title" id="roomTitle">채팅방</div><div class="sub" id="roomSub"></div></div>
        <div class="menuWrap">
          <div class="menuBtn clickable" id="menuBtn">…</div>
          <div class="menu" id="menu">
            <button id="mEnableNoti"><span>알림 켜기</span><span id="mEnableNotiState">›</span></button>
            <button id="mSound"><span>소리(삐) 켜기</span><span id="mSoundState">›</span></button>
            <button id="mMyBubbleWhite"><span>내 말풍선 흰색</span><span id="mMyBubbleWhiteState">›</span></button>
            <button id="mNick"><span>닉네임 변경</span><span>›</span></button>
            <button id="mRoomName"><span>방 이름 변경</span><span>›</span></button>
            <button id="mRoomPass"><span>비밀번호 설정</span><span>›</span></button>
            <button id="mLeave"><span>나가기</span><span>›</span></button>
            <div class="hint" id="menuHint"></div>
          </div>
        </div>
      </div>
    </header>

    <div class="home" id="home">
      <div class="homeCard">
        <div class="homeTitle">대기실</div>
        <div class="field"><label>내 닉네임</label><input id="homeNick" type="text" placeholder="예: 송대호" /></div>
        <div class="sectionTitle">방 만들기</div>
        <div class="field"><label>방 이름</label><input id="homeRoomName" type="text" placeholder="예: 테스트방" /></div>
        <div class="field"><label style="display:flex;align-items:center;gap:8px;"><input id="homeUsePass" type="checkbox" style="width:18px;height:18px;" /> 비밀번호 사용</label></div>
        <div class="field" id="homePassField" style="display:none;"><label>방 비밀번호</label><input id="homeRoomPass" type="password" placeholder="예: 1234" /></div>
        <div class="rowBtns"><button class="primaryBtn" id="btnCreate">방 만들기</button><button class="ghostBtn" id="btnRefresh">새로고침</button></div>
        <div class="sectionTitle">채팅방 목록</div>
        <div class="roomList" id="roomList"></div>
      </div>
    </div>

    <div class="typingBar" id="typingBar"></div>
    <div class="log" id="log" style="display:none;">
      <div id="readSentinel"></div>
    </div>

    <div class="emojiPanel" id="emojiPanel"><div class="emojiGrid" id="emojiGrid"></div></div>

    <div class="composer" id="composer" style="display:none;">
      <div class="replyPreview" id="replyPreview">
        <div style="width:3px;height:24px;background:var(--accent);border-radius:2px;flex-shrink:0;"></div>
        <div style="flex:1;min-width:0;">
          <div id="replyPreviewName" style="font-weight:700;color:var(--accent);"></div>
          <div id="replyPreviewMsg" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
        </div>
        <button id="replyCloseBtn" style="border:0;background:none;font-size:18px;flex-shrink:0;">✕</button>
      </div>
      <div class="emojiBtn clickable" id="emojiBtn">😊</div>
      <div class="inputWrap"><input id="input" type="text" autocomplete="off" placeholder="메시지를 입력하세요" /></div>
      <button class="sendBtn" id="send" disabled>전송</button>
    </div>
  </div>

  <div class="msgCtxMenu" id="msgCtxMenu">
    <div class="quickReact" id="quickReactBar">
      <span data-e="👍">👍</span><span data-e="❤️">❤️</span><span data-e="😂">😂</span>
      <span data-e="😮">😮</span><span data-e="😢">😢</span><span data-e="🔥">🔥</span>
    </div>
    <button id="ctxReply">↩️ 답글</button>
    <button id="ctxEdit">✏️ 수정</button>
    <button id="ctxDelete" class="danger">🗑 삭제</button>
  </div>

  <div class="toast" id="toast"></div>

  <!-- 비밀번호 모달 -->
  <div class="modalOverlay" id="passModal">
    <div class="modalCard">
      <div class="modalTitle" id="passModalTitle">비밀번호</div>
      <div id="passModalBody" style="font-size:13px;color:var(--muted);"></div>
      <input class="passInput" id="passModalInput" type="password" placeholder="비밀번호" />
      <div class="modalBtnsRow">
        <button class="primaryBtn" id="passModalOk">확인</button>
        <button class="ghostBtn" id="passModalCancel">취소</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

  <script>
    const PUSH_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbyyEYvCwwTsmlaQwKIUsA00gHbBVNpGiHr_hRUGREUCgcquHH5lY3SHcBTlKU_v6Lqz/exec";
    const PUSH_SECRET = "ryo1234";
    const firebaseConfig = {
      apiKey: "AIzaSyC6iyCkpqtaWgFXlJZiogn2SgfIz9j1I4M",
      authDomain: "messenger-222df.firebaseapp.com",
      databaseURL: "https://messenger-222df-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "messenger-222df",
      storageBucket: "messenger-222df.firebasestorage.app",
      messagingSenderId: "694962613962",
      appId: "1:694962613962:web:764e45b00345a8a27f4e33"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const SV = firebase.database.ServerValue;
    const NAV_URL = location.origin + location.pathname;

    // ── 상태 ──────────────────────────────────────────────────────
    let myUid = '', myNick = '', roomId = '', roomName = '';
    let seen = new Map();
    let reactionWatchers = new Map();
    let presenceRef = null, presenceListRef = null;
    let typingWatchRef = null, readsWatchRef = null, msgRef = null;
    let readsCache = {};
    // ★ 방 입장 시점에 확보한 "내 마지막 읽은 seq" — 이 값보다 큰 메시지만 unread로 카운트
    let myBaseReadSeq = 0;
    let unread = 0;
    let soundEnabled = true, notiEnabled = false, myBubbleWhite = false;
    let currentReplyTo = null;
    let ctxTargetMid = null, ctxTargetSenderId = null;
    let editingMid = null;
    let typingDebounceTimer = null, isTypingSent = false;
    let readObserver = null, visibilityHandler = null;
    let oldestSeq = null;
    let onlineMembers = {};   // uid → { nick, lastSeen }

    // ── 유틸 ──────────────────────────────────────────────────────
    function uuid(){ return 'u'+Date.now()+'_'+Math.random().toString(16).slice(2); }
    function escapeHtml(s){
      return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function fmt(ts){
      return new Intl.DateTimeFormat('ko-KR',{month:'numeric',day:'numeric',hour:'numeric',minute:'2-digit'}).format(new Date(ts));
    }

    // ★ unread 는 항상 이 함수를 통해서만 변경
    function setUnread(n){
      unread = Math.max(0, n);
      document.title = unread > 0 ? '('+unread+') '+roomName : (roomName || 'Chat');
    }
    function clearUnread(){ setUnread(0); }

    let toastTimer = null;
    function showToast(msg, dur=2000){
      const el = document.getElementById('toast');
      el.textContent = msg; el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(()=>el.classList.remove('show'), dur);
    }

    // ── DOM ────────────────────────────────────────────────────────
    const logEl     = document.getElementById('log');
    const inputEl   = document.getElementById('input');
    const sendBtn   = document.getElementById('send');
    const typingBar = document.getElementById('typingBar');
    const header    = document.getElementById('header');
    const home      = document.getElementById('home');
    const composer  = document.getElementById('composer');
    const roomTitle = document.getElementById('roomTitle');
    const roomSub   = document.getElementById('roomSub');
    const menuBtn   = document.getElementById('menuBtn');
    const menu      = document.getElementById('menu');

    // ── 이모지 패널 ────────────────────────────────────────────────
    const EMOJIS = ['😀','😂','🥰','😎','🤔','😢','😡','🤩','👍','👎','❤️','🔥','✅','🎉','💯','🙏','😮','😴','🤣','😊','👋','🙌','💪','🎊','🍀','⭐','🌈','💬'];
    EMOJIS.forEach(em=>{
      const el=document.createElement('div'); el.className='emoji clickable'; el.textContent=em;
      el.onclick=()=>{ inputEl.value+=em; onInput(); document.getElementById('emojiPanel').classList.remove('open'); inputEl.focus(); };
      document.getElementById('emojiGrid').appendChild(el);
    });
    document.getElementById('emojiBtn').onclick=e=>{
      e.stopPropagation(); document.getElementById('emojiPanel').classList.toggle('open');
    };

    // ── Presence ───────────────────────────────────────────────────
    function startPresence(rid){
      stopPresence();
      presenceRef = db.ref('presence/'+rid+'/'+myUid);
      presenceListRef = db.ref('presence/'+rid);
      const update = ()=>{
        if(!presenceRef) return;
        if(document.visibilityState==='visible'){
          presenceRef.set({nick:myNick, lastSeen:SV.TIMESTAMP});
          presenceRef.onDisconnect().remove();
        } else presenceRef.remove();
      };
      visibilityHandler = update;
      document.addEventListener('visibilitychange', visibilityHandler);
      update();
      presenceListRef.on('value', snap=>{
        onlineMembers = snap.val()||{};
        const nicks = [...new Set(Object.values(onlineMembers).map(p=>p.nick))].slice(0,10);
        setHeader(nicks);
      });
    }
    function stopPresence(){
      if(visibilityHandler) document.removeEventListener('visibilitychange', visibilityHandler);
      if(presenceRef){ presenceRef.remove(); presenceRef.off(); presenceRef=null; }
      if(presenceListRef){ presenceListRef.off(); presenceListRef=null; }
    }

    // ── Typing ─────────────────────────────────────────────────────
    function sendTypingStatus(isTyping){
      if(!roomId||!myUid||isTypingSent===isTyping) return;
      isTypingSent=isTyping;
      const ref=db.ref('typing/'+roomId+'/'+myUid);
      if(isTyping){ ref.set({nick:myNick,until:Date.now()+10000}); ref.onDisconnect().remove(); }
      else ref.remove();
    }
    function onInput(){
      sendBtn.disabled=!inputEl.value.trim();
      if(!roomId) return;
      sendTypingStatus(true);
      if(typingDebounceTimer) clearTimeout(typingDebounceTimer);
      typingDebounceTimer=setTimeout(()=>sendTypingStatus(false),3000);
    }
    function startTyping(rid){
      if(typingWatchRef) typingWatchRef.off();
      typingWatchRef=db.ref('typing/'+rid);
      typingWatchRef.on('value',snap=>{
        const v=snap.val()||{}, now=Date.now(); let best=null;
        Object.keys(v).forEach(uid=>{ if(uid!==myUid&&v[uid].until>now) if(!best||v[uid].until>best.until) best=v[uid]; });
        showTypingBar(best?best.nick+' 님이 입력 중입니다':'');
      });
    }
    function stopTyping(){
      if(typingWatchRef){ typingWatchRef.off(); typingWatchRef=null; }
      if(typingDebounceTimer) clearTimeout(typingDebounceTimer);
      sendTypingStatus(false); showTypingBar('');
    }

    // ── Reads ──────────────────────────────────────────────────────
    function startReads(rid){
      if(readsWatchRef){ readsWatchRef.off(); }
      readsWatchRef=db.ref('reads/'+rid);
      readsWatchRef.on('value',snap=>{ readsCache=snap.val()||{}; updateReadBadges(); });
      if(readObserver){ readObserver.disconnect(); }
      readObserver=new IntersectionObserver(entries=>{
        if(entries[0].isIntersecting&&!document.hidden){ markReadNow(); clearUnread(); }
      },{root:logEl,threshold:0.1});
      const sentinel=document.getElementById('readSentinel');
      if(sentinel) readObserver.observe(sentinel);
      window.removeEventListener('focus',onWindowFocus);
      window.addEventListener('focus',onWindowFocus);
    }
    function onWindowFocus(){ markReadNow(); clearUnread(); }
    function stopReads(){
      if(readObserver){ readObserver.disconnect(); readObserver=null; }
      if(readsWatchRef){ readsWatchRef.off(); readsWatchRef=null; }
      window.removeEventListener('focus',onWindowFocus);
    }
    function markReadNow(){
      if(!roomId||!myUid) return;
      const entries=[...seen.values()]; if(!entries.length) return;
      const last=entries[entries.length-1];
      db.ref('reads/'+roomId+'/'+myUid).set({nick:myNick,lastReadSeq:last.seq,ts:SV.TIMESTAMP}).catch(()=>{});
    }
    function updateReadBadges(){
      seen.forEach((info,mid)=>{
        if(info.senderId!==myUid) return;
        const readers=Object.entries(readsCache).filter(([uid,r])=>uid!==myUid&&r.lastReadSeq>=info.seq);
        let badge=info.metaEl.querySelector('.readBadge');
        if(!badge){ badge=document.createElement('span'); badge.className='readBadge'; info.metaEl.appendChild(badge); }
        badge.textContent=readers.length>0?'읽음 '+readers.length:'';
      });
    }

    // ── 리액션 ─────────────────────────────────────────────────────
    function watchReactions(mid){
      if(reactionWatchers.has(mid)) return;
      const ref=db.ref('reactions/'+roomId+'/'+mid);
      ref.on('value',snap=>updateReactionUI(mid,snap.val()||{}));
      reactionWatchers.set(mid,ref);
    }
    function stopReactions(){ reactionWatchers.forEach(r=>r.off()); reactionWatchers.clear(); }
    function updateReactionUI(mid,data){
      const info=seen.get(mid); if(!info) return;
      let row=info.wrapEl.querySelector('.reactRow');
      if(!row){ row=document.createElement('div'); row.className='reactRow'; const r=info.wrapEl.querySelector('.row'); if(r) r.after(row); }
      row.innerHTML='';
      Object.entries(data).forEach(([emoji,users])=>{
        const uids=Object.keys(users); if(!uids.length) return;
        const chip=document.createElement('span');
        chip.className='reactChip'+(users[myUid]?' mine':'');
        chip.textContent=emoji+' '+uids.length;
        chip.onclick=()=>toggleReaction(mid,emoji);
        row.appendChild(chip);
      });
    }
    function toggleReaction(mid,emoji){
      if(!roomId||!myUid) return;
      const ref=db.ref('reactions/'+roomId+'/'+mid+'/'+emoji+'/'+myUid);
      ref.once('value').then(snap=>{ if(snap.exists()) ref.remove().catch(()=>{}); else ref.set(myNick).catch(()=>{}); }).catch(()=>{});
    }

    // ── 메시지 렌더링 ──────────────────────────────────────────────
    function renderMessage(m, prepend=false){
      if(seen.has(m.messageId)) return;
      const isMine=m.senderId===myUid;
      const wrap=document.createElement('div'); wrap.className='msg'; wrap.dataset.mid=m.messageId;
      const row=document.createElement('div'); row.className='row '+(isMine?'me':'other');
      const bubble=document.createElement('div'); bubble.className='bubble';
      rebuildBubble(bubble,m); row.appendChild(bubble); wrap.appendChild(row);
      const meta=document.createElement('div'); meta.className='meta '+(isMine?'me':'');
      meta.innerHTML='<span>'+escapeHtml(m.senderNick)+'</span><span>'+(m.ts?fmt(m.ts):'')+'</span>';
      wrap.appendChild(meta);
      const sentinel=document.getElementById('readSentinel');
      if(prepend) logEl.insertBefore(wrap,logEl.firstChild);
      else logEl.insertBefore(wrap,sentinel);
      seen.set(m.messageId,{seq:m.seq||0,metaEl:meta,senderId:m.senderId,wrapEl:wrap,bubbleEl:bubble,text:m.text,replyTo:m.replyTo});
      watchReactions(m.messageId);

      // ★ unread 카운트: 내 메시지가 아니고, prepend(과거 로드)가 아니며,
      //    방 입장 시 이미 읽은 seq(myBaseReadSeq)보다 큰 메시지만 카운트
      if(!isMine && !prepend && (m.seq||0) > myBaseReadSeq){
        setUnread(unread+1);
      }

      // 롱프레스 / 우클릭
      let lp=null;
      wrap.oncontextmenu=e=>{ e.preventDefault(); openMsgMenu(m.messageId,m.senderId,wrap,bubble,e.clientX,e.clientY); };
      wrap.addEventListener('touchstart',()=>{ lp=setTimeout(()=>openMsgMenu(m.messageId,m.senderId,wrap,bubble),500); },{passive:true});
      wrap.addEventListener('touchend',()=>clearTimeout(lp),{passive:true});
      wrap.addEventListener('touchmove',()=>clearTimeout(lp),{passive:true});
    }

    function rebuildBubble(bubble,m){
      bubble.innerHTML='';
      if(m.deleted){ bubble.className='bubble deletedBubble'; bubble.textContent='삭제된 메시지입니다.'; return; }
      bubble.className='bubble';
      if(m.replyTo){
        const q=document.createElement('div'); q.className='replyQuote';
        q.innerHTML='<div style="font-weight:700;color:var(--accent)">'+escapeHtml(m.replyTo.nick)+'</div><div>'+escapeHtml((m.replyTo.text||'').slice(0,50))+'</div>';
        q.onclick=()=>{ const t=logEl.querySelector('[data-mid="'+m.replyTo.mid+'"]'); if(t) t.scrollIntoView({behavior:'smooth',block:'center'}); };
        bubble.appendChild(q);
      }
      const txt=document.createElement('div'); txt.textContent=m.text; bubble.appendChild(txt);
    }

    // ── 컨텍스트 메뉴 ──────────────────────────────────────────────
    function openMsgMenu(mid,senderId,wrap,bubble,x,y){
      ctxTargetMid=mid; ctxTargetSenderId=senderId;
      const isMine=senderId===myUid;
      document.getElementById('ctxEdit').style.display=isMine?'':'none';
      document.getElementById('ctxDelete').style.display=isMine?'':'none';
      const ctx=document.getElementById('msgCtxMenu'); ctx.classList.add('open');
      if(x!==undefined){
        ctx.style.left=Math.min(x,window.innerWidth-180)+'px';
        ctx.style.top=Math.min(y,window.innerHeight-200)+'px';
      } else {
        const r=bubble.getBoundingClientRect();
        ctx.style.left=Math.min(r.left,window.innerWidth-180)+'px';
        ctx.style.top=Math.min(r.bottom+4,window.innerHeight-200)+'px';
      }
    }
    function closeMsgMenu(){ document.getElementById('msgCtxMenu').classList.remove('open'); }

    document.getElementById('quickReactBar').onclick=e=>{
      const emoji=e.target.dataset.e;
      if(emoji&&ctxTargetMid){ toggleReaction(ctxTargetMid,emoji); closeMsgMenu(); }
    };
    document.getElementById('ctxReply').onclick=()=>{
      if(!ctxTargetMid) return;
      const info=seen.get(ctxTargetMid); if(!info) return;
      const nick=info.senderId===myUid?myNick:(info.metaEl.querySelector('span')?.textContent||'');
      currentReplyTo={mid:ctxTargetMid,nick,text:info.text};
      document.getElementById('replyPreviewName').textContent=nick;
      document.getElementById('replyPreviewMsg').textContent=(info.text||'').slice(0,60);
      document.getElementById('replyPreview').style.display='flex';
      closeMsgMenu(); inputEl.focus();
    };
    document.getElementById('ctxEdit').onclick=()=>{
      if(!ctxTargetMid||ctxTargetSenderId!==myUid) return;
      const info=seen.get(ctxTargetMid); if(!info||!info.text) return;
      editingMid=ctxTargetMid; inputEl.value=info.text; sendBtn.textContent='수정'; sendBtn.disabled=false;
      closeMsgMenu(); inputEl.focus();
    };
    document.getElementById('ctxDelete').onclick=async()=>{
      if(!ctxTargetMid||ctxTargetSenderId!==myUid) return;
      if(!confirm('메시지를 삭제할까요?')) return;
      closeMsgMenu();
      try{
        await db.ref('messages/'+roomId+'/'+ctxTargetMid).update({deleted:true,text:''});
        await db.ref('reactions/'+roomId+'/'+ctxTargetMid).remove();
      } catch(e){ showToast('삭제 실패: '+e.message); }
    };
    document.addEventListener('click',e=>{
      if(!document.getElementById('msgCtxMenu').contains(e.target)) closeMsgMenu();
      if(!document.getElementById('emojiPanel').contains(e.target)&&!document.getElementById('emojiBtn').contains(e.target))
        document.getElementById('emojiPanel').classList.remove('open');
      if(!menu.contains(e.target)&&!menuBtn.contains(e.target)) menu.classList.remove('open');
    });

    // ── 메시지 구독/해제 ───────────────────────────────────────────
    function stopMessages(){
      if(msgRef){ msgRef.off(); msgRef=null; }
      stopReactions(); seen.clear();
    }
    function subscribeMessages(rid){
      msgRef=db.ref('messages/'+rid).orderByChild('seq').limitToLast(50);
      msgRef.on('child_added',snap=>{
        const m={messageId:snap.key,...snap.val()};
        renderMessage(m);
        if(oldestSeq===null||m.seq<oldestSeq) oldestSeq=m.seq;
        scrollToBottom();
      });
      msgRef.on('child_changed',snap=>{
        const m={messageId:snap.key,...snap.val()};
        const info=seen.get(m.messageId);
        if(info){ rebuildBubble(info.bubbleEl,m); info.text=m.text; }
      });
    }
    function addLoadMoreBtn(){
      if(logEl.querySelector('.loadMoreBtn')) return;
      const btn=document.createElement('button'); btn.className='loadMoreBtn'; btn.textContent='이전 메시지 더 보기';
      btn.onclick=loadOlderMessages; logEl.insertBefore(btn,logEl.firstChild);
    }
    async function loadOlderMessages(){
      if(!roomId||oldestSeq===null) return;
      try{
        const snap=await db.ref('messages/'+roomId).orderByChild('seq').endAt(oldestSeq-1).limitToLast(30).once('value');
        const msgs=[]; snap.forEach(c=>msgs.push({messageId:c.key,...c.val()}));
        if(!msgs.length){ showToast('더 이상 메시지가 없습니다'); return; }
        const sh=logEl.scrollHeight;
        msgs.forEach(m=>{ if(!seen.has(m.messageId)){ renderMessage(m,true); if(m.seq<oldestSeq) oldestSeq=m.seq; } });
        logEl.scrollTop=logEl.scrollHeight-sh;
      } catch(e){ showToast('불러오기 실패: '+e.message); }
    }
    function scrollToBottom(){ requestAnimationFrame(()=>{ logEl.scrollTop=logEl.scrollHeight; }); }

    // ── 메시지 전송 ────────────────────────────────────────────────
    async function send(){
      const text=inputEl.value.trim(); if(!text||!roomId) return;
      if(editingMid){
        try{ await db.ref('messages/'+roomId+'/'+editingMid).update({text,edited:true}); showToast('수정되었습니다'); }
        catch(e){ showToast('수정 실패: '+e.message); return; }
        editingMid=null; sendBtn.textContent='전송'; inputEl.value=''; onInput(); return;
      }
      const mid=uuid();
      const seq=Date.now()*1000+Math.floor(Math.random()*1000);
      const m={senderId:myUid,senderNick:myNick,text,ts:SV.TIMESTAMP,seq,...(currentReplyTo?{replyTo:currentReplyTo}:{})};
      inputEl.value=''; clearReply(); onInput(); sendTypingStatus(false);
      try{ await db.ref('messages/'+roomId+'/'+mid).set(m); }
      catch(e){ showToast('전송 실패: '+e.message); inputEl.value=text; onInput(); }
    }


    // ── 방 입장 ────────────────────────────────────────────────────
    function showPassModal(title,body){
      return new Promise(resolve=>{
        document.getElementById('passModalTitle').textContent=title;
        document.getElementById('passModalBody').textContent=body;
        document.getElementById('passModalInput').value='';
        const modal=document.getElementById('passModal'); modal.classList.add('open');
        document.getElementById('passModalOk').onclick=()=>{ modal.classList.remove('open'); resolve(document.getElementById('passModalInput').value); };
        document.getElementById('passModalCancel').onclick=()=>{ modal.classList.remove('open'); resolve(null); };
      });
    }

    async function enterRoomLocal(rid, infoOpt){
      const nickInput=document.getElementById('homeNick').value.trim();
      if(nickInput){ myNick=nickInput; localStorage.setItem('chat_nick',myNick); }
      stopMessages(); stopPresence(); stopTyping(); stopReads();
      oldestSeq=null; unread=0;

      let info=infoOpt;
      if(!info){
        try{ const snap=await db.ref('rooms/'+rid).once('value'); info=snap.val(); }
        catch(e){ showToast('방 정보를 불러올 수 없습니다'); return; }
      }
      if(!info){ showToast('존재하지 않는 방입니다'); return; }

      if(info.password){
        const entered=await showPassModal('비밀번호 입력', info.roomName+' 방의 비밀번호를 입력하세요');
        if(entered===null) return;
        if(entered!==info.password){ showToast('비밀번호가 틀렸습니다'); return; }
      }

      roomId=rid; roomName=info.roomName;

      // ★ 핵심 수정: 메시지 구독 전에 내 마지막 읽은 seq를 먼저 로드
      // → child_added로 오는 기존 메시지들의 seq가 이 값 이하면 unread 카운트 안함
      try{
        const rs=await db.ref('reads/'+rid+'/'+myUid).once('value');
        myBaseReadSeq=(rs.val()||{}).lastReadSeq||0;
      } catch(e){ myBaseReadSeq=0; }

      home.style.display='none'; header.style.display='block';
      logEl.style.display='block'; composer.style.display='flex';
      typingBar.style.display='none';
      roomTitle.textContent=roomName; document.title=roomName;
      history.replaceState({},'',NAV_URL+'?roomId='+rid);
      logEl.innerHTML='<div id="readSentinel"></div>';
      seen.clear(); readsCache={}; unread=0;

      startPresence(roomId); startTyping(roomId); startReads(roomId);
      subscribeMessages(roomId);
      setTimeout(()=>{ if(seen.size>=50) addLoadMoreBtn(); },1200);
    }

    function showHome(){
      stopMessages(); stopPresence(); stopTyping(); stopReads();
      roomId=''; unread=0;
      home.style.display=''; header.style.display='none';
      logEl.style.display='none'; composer.style.display='none';
      typingBar.style.display='none'; document.title='Chat';
      history.replaceState({},'',NAV_URL); refreshRooms();
    }

    // ── 방 목록 ────────────────────────────────────────────────────
    async function refreshRooms(){
      try{
        const snap=await db.ref('rooms').limitToLast(30).once('value');
        const list=document.getElementById('roomList'); list.innerHTML='';
        const entries=Object.entries(snap.val()||{}).reverse();
        if(!entries.length){ list.innerHTML='<div style="color:var(--muted);font-size:13px;padding:8px 0;">방이 없습니다. 새 방을 만들어보세요!</div>'; return; }
        entries.forEach(([id,r])=>{
          const item=document.createElement('div'); item.className='roomItem clickable';
          const lock=(r.password&&r.password!==null)?' 🔒':'';
          item.innerHTML='<div style="flex:1;min-width:0;"><b>'+escapeHtml(r.roomName)+lock+'</b><div style="font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">ID: '+id.slice(0,12)+'…</div></div>'
            +'<button class="ghostBtn" style="flex:0;min-width:52px;width:52px;height:36px;padding:0;font-size:13px;white-space:nowrap;">입장</button>';
          item.onclick=()=>enterRoomLocal(id,r);
          list.appendChild(item);
        });
      } catch(e){ showToast('목록 불러오기 실패: '+e.message); }
    }

    // ── 메뉴 핸들러 ────────────────────────────────────────────────
    menuBtn.onclick=e=>{ e.stopPropagation(); menu.classList.toggle('open'); };
    document.getElementById('mEnableNoti').onclick=async()=>{
      if(!window.__OS){ showToast('알림 초기화 중입니다'); return; }
      try{
        if(!notiEnabled){ await window.__OS.Notifications.requestPermission(); notiEnabled=true; document.getElementById('mEnableNotiState').textContent='✅'; showToast('알림이 켜졌습니다'); }
        else{ notiEnabled=false; document.getElementById('mEnableNotiState').textContent='›'; showToast('알림이 꺼졌습니다'); }
      } catch(e){ showToast('알림 설정 실패'); }
      menu.classList.remove('open');
    };
    document.getElementById('mSound').onclick=()=>{
      soundEnabled=!soundEnabled;
      document.getElementById('mSoundState').textContent=soundEnabled?'✅':'›';
      showToast(soundEnabled?'소리가 켜졌습니다':'소리가 꺼졌습니다');
      menu.classList.remove('open');
    };
    document.getElementById('mMyBubbleWhite').onclick=()=>{
      myBubbleWhite=!myBubbleWhite;
      document.documentElement.style.setProperty('--me',myBubbleWhite?'#ffffff':'#374151');
      document.documentElement.style.setProperty('--meText',myBubbleWhite?'#111827':'#ffffff');
      document.getElementById('mMyBubbleWhiteState').textContent=myBubbleWhite?'✅':'›';
      localStorage.setItem('chat_bubbleWhite',myBubbleWhite?'1':'');
      menu.classList.remove('open');
    };
    document.getElementById('mNick').onclick=()=>{
      const n=prompt('새 닉네임을 입력하세요:',myNick); if(!n||!n.trim()) return;
      myNick=n.trim(); localStorage.setItem('chat_nick',myNick); showToast('닉네임이 변경되었습니다'); menu.classList.remove('open');
    };
    document.getElementById('mRoomName').onclick=async()=>{
      const n=prompt('새 방 이름:',roomName); if(!n||!n.trim()) return;
      try{ await db.ref('rooms/'+roomId).update({roomName:n.trim()}); roomName=n.trim(); roomTitle.textContent=roomName; document.title=roomName; showToast('방 이름이 변경되었습니다'); }
      catch(e){ showToast('변경 실패: '+e.message); }
      menu.classList.remove('open');
    };
    document.getElementById('mRoomPass').onclick=async()=>{
      const pw=prompt('새 비밀번호 (비워두면 해제):'); if(pw===null) return;
      try{ await db.ref('rooms/'+roomId).update({password:pw.trim()||null}); showToast(pw.trim()?'비밀번호가 설정되었습니다':'비밀번호가 해제되었습니다'); }
      catch(e){ showToast('설정 실패: '+e.message); }
      menu.classList.remove('open');
    };
    document.getElementById('mLeave').onclick=()=>{ menu.classList.remove('open'); if(confirm('채팅방에서 나가시겠습니까?')) showHome(); };

    // ── 홈 버튼 ────────────────────────────────────────────────────
    document.getElementById('btnCreate').onclick=async()=>{
      const nick=document.getElementById('homeNick').value.trim();
      if(nick){ myNick=nick; localStorage.setItem('chat_nick',myNick); }
      const name=document.getElementById('homeRoomName').value.trim();
      if(!name){ showToast('방 이름을 입력하세요'); return; }
      const usePass=document.getElementById('homeUsePass').checked;
      const pw=usePass?document.getElementById('homeRoomPass').value:'';
      const rid=uuid();
      try{
        await db.ref('rooms/'+rid).set({roomName:name,ownerUid:myUid,createdAt:SV.TIMESTAMP,...(pw?{password:pw}:{})});
        enterRoomLocal(rid,{roomName:name,ownerUid:myUid,password:pw||null});
      } catch(e){ showToast('방 생성 실패: '+e.message); }
    };
    document.getElementById('btnRefresh').onclick=refreshRooms;
    document.getElementById('homeUsePass').onchange=function(){
      document.getElementById('homePassField').style.display=this.checked?'':'none';
    };

    // ── 인풋 이벤트 ────────────────────────────────────────────────
    inputEl.oninput=onInput;
    inputEl.onkeydown=e=>{ if(e.key==='Enter'&&!e.isComposing) send(); };
    sendBtn.onclick=send;
    document.getElementById('replyCloseBtn').onclick=clearReply;
    function clearReply(){ currentReplyTo=null; document.getElementById('replyPreview').style.display='none'; }
    function setHeader(users){ roomSub.innerHTML='<span class="pill">🟢 온라인: '+(users.join(', ')||myNick)+'</span>'; }
    function showTypingBar(t){ typingBar.style.display=t?'flex':'none'; typingBar.textContent=t; }

    // ── 초기화 ─────────────────────────────────────────────────────
    async function init(){
      try{
        await firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);
        const cur=firebase.auth().currentUser;
        const cred=cur?{user:cur}:await firebase.auth().signInAnonymously();
        myUid=cred.user.uid; localStorage.setItem('chat_uid',myUid);
      } catch(e){ showToast('인증 오류: '+e.message); return; }
      myNick=localStorage.getItem('chat_nick')||'익명_'+myUid.slice(0,4);
      document.getElementById('homeNick').value=myNick;
      if(localStorage.getItem('chat_bubbleWhite')){
        myBubbleWhite=true;
        document.documentElement.style.setProperty('--me','#ffffff');
        document.documentElement.style.setProperty('--meText','#111827');
        document.getElementById('mMyBubbleWhiteState').textContent='✅';
      }
      const urlRoomId=new URLSearchParams(location.search).get('roomId');
      if(urlRoomId) enterRoomLocal(urlRoomId);
      else refreshRooms();
    }
    window.onpopstate=()=>{
      const rid=new URLSearchParams(location.search).get('roomId');
      if(rid) enterRoomLocal(rid); else showHome();
    };
    init();
  </script>
</body>
</html>
