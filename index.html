<!doctype html>
<html lang="ko">
<head>
<link rel="manifest" href="/manifest.json">
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
  <title>Chat</title>
  <style>
    :root{
      --bg:#f3f4f6;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;

      /* 기본(상대/내 말풍선) */
      --me:#374151;
      --meText:#ffffff;

      --other:#ffffff;
      --otherText:#111827;

      --accent:#22c55e;
      --danger:#ef4444;

      --safeB: env(safe-area-inset-bottom, 0px);
      --safeBComp: var(--safeB);
      --safeT: env(safe-area-inset-top, 0px);
      --kb: 0px;
      --kbFix: 40px;
      --appH: 100dvh;
      --composerH: 64px;

      --typingH: 34px;

      --shadow: 0 10px 30px rgba(0,0,0,0.06);
      --shadow2: 0 14px 40px rgba(0,0,0,0.12);
    }

    *{ box-sizing:border-box; }
    html, body{
      height:100%;
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif;
      overflow:hidden;
    }

    button, .clickable{
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      cursor: pointer;
      transition: transform .08s ease, box-shadow .18s ease, filter .18s ease, background .18s ease, border-color .18s ease;
    }
    button:active, .clickable:active{ transform: translateY(1px) scale(0.99); }
    button:focus-visible{
      outline: 3px solid rgba(34,197,94,0.35);
      outline-offset: 2px;
    }

    .app{
      height:100vh;
      height:100dvh;
      height: var(--appH, 100dvh);
      display:flex;
      flex-direction:column;
      min-height:0;
      overflow:hidden;
      padding-top: var(--safeT);
      background: var(--bg);
      -webkit-transform: translateZ(0);
      transform: translateZ(0);
    }

    header{
      position:sticky;
      top:0;
      z-index:10;
      padding: 12px 14px 10px 14px;
      border-bottom:1px solid var(--line);
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
    }

    .headTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .title{
      font-size:16px;
      font-weight:800;
      margin:0;
      line-height:1.2;
    }
    .sub{
      margin-top:6px;
      font-size:12px;
      color:var(--muted);
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding: 6px 10px;
      border-radius: 999px;
      border:1px solid var(--line);
      background:#fff;
      font-size:12px;
      color:var(--muted);
    }

    .menuWrap{
      position:relative;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .menuBtn{
      width:40px;
      height:40px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      line-height:1;
      user-select:none;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
    }
    .menuBtn:hover{ filter: brightness(0.98); }
    .menu{
      position:absolute;
      right:0;
      top:46px;
      min-width: 280px;
      background:#fff;
      border:1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow2);
      overflow:hidden;
      display:none;
    }
    .menu.open{ display:block; }
    .menu button{
      width:100%;
      padding: 12px 12px;
      border:0;
      background:#fff;
      text-align:left;
      font-size:14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
    .menu button:hover{ background:#f8fafc; }
    .menu button:active{ background:#f3f4f6; }
    .menu .hint{
      font-size:12px;
      color:var(--muted);
      padding:10px 12px;
      border-top:1px solid var(--line);
      line-height:1.35;
      white-space:pre-wrap;
    }

    .home{
      flex:1;
      min-height:0;
      overflow:auto;
      padding: 16px;
      -webkit-overflow-scrolling: touch;
    }
    .homeCard{
      width:100%;
      max-width: 720px;
      margin: 0 auto;
      background:#fff;
      border:1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      box-shadow: var(--shadow);
    }
    .homeTitle{
      font-weight:900;
      font-size:18px;
      margin:0 0 10px 0;
    }
    .sectionTitle{
      font-size:12px;
      color:var(--muted);
      font-weight:800;
      margin: 14px 0 8px 0;
    }
    .field{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin: 10px 0;
    }
    .field label{
      font-size:12px;
      color:var(--muted);
    }
    .field input{
      height:46px;
      border-radius: 14px;
      border:1px solid var(--line);
      padding: 0 12px;
      font-size:16px;
      outline:none;
      transition: box-shadow .18s ease, border-color .18s ease;
    }
    .field input:focus{
      border-color: rgba(34,197,94,0.6);
      box-shadow: 0 0 0 4px rgba(34,197,94,0.12);
    }
    .rowBtns{
      display:flex;
      gap:10px;
      margin-top: 10px;
    }
    .primaryBtn{
      flex:1;
      height:46px;
      border-radius: 14px;
      border:0;
      background:#111827;
      color:#fff;
      font-size:15px;
      font-weight:900;
      box-shadow: 0 10px 18px rgba(17,24,39,0.14);
    }
    .primaryBtn:hover{ filter: brightness(1.03); }
    .ghostBtn{
      flex:1;
      height:46px;
      border-radius: 14px;
      border:1px solid var(--line);
      background:#fff;
      color:#111827;
      font-size:15px;
      font-weight:800;
    }
    .ghostBtn:hover{ background:#f8fafc; }

    .roomList{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .roomItem{
      border:1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      background:#fff;
      box-shadow: 0 6px 18px rgba(0,0,0,0.04);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .roomItem:hover{ background:#f8fafc; }
    .roomLeft{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:0;
    }
    .roomName{
      font-weight:900;
      font-size:15px;
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .roomMeta{
      font-size:12px;
      color:var(--muted);
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .roomRight{
      display:flex;
      align-items:center;
      gap:8px;
      flex-shrink:0;
    }
    .chip{
      border:1px solid var(--line);
      background:#fff;
      border-radius: 999px;
      padding: 6px 10px;
      font-size:12px;
      color:var(--muted);
      display:inline-flex;
      align-items:center;
      gap:6px;
    }
    .chipSubbed{
      border-color: var(--accent);
      background: #f0fdf4;
      color: var(--accent);
    }

    .log{
      flex:1;
      min-height:0;
      overflow:auto;
      padding: 12px 12px calc(var(--composerH) + var(--typingH) + max(0px, calc(var(--kb) + var(--safeBComp) - var(--kbFix))) + 12px) 12px;
      -webkit-overflow-scrolling: touch;
    }

    .loadMoreBtn{
      display:flex;
      justify-content:center;
      padding:16px 12px;
      margin-bottom:12px;
    }
    .loadMoreBtn button{
      padding:10px 20px;
      border:1px solid var(--line);
      border-radius:10px;
      background:#fff;
      font-size:13px;
      font-weight:700;
      color:var(--muted);
      cursor:pointer;
      transition:all .2s;
    }
    .loadMoreBtn button:hover{ background:#f8fafc; }
    .loadMoreBtn button:active{ transform:scale(0.98); }
    .loadMoreBtn button.loading{ opacity:0.6; pointer-events:none; }

    .msg{
      display:flex;
      flex-direction:column;
      gap:4px;
      margin: 10px 0;
      width:100%;
    }
    .row{
      display:flex;
      gap:8px;
      width:100%;
    }
    .row.me{ justify-content:flex-end; }
    .row.other{ justify-content:flex-start; }

    .bubble{
      max-width: 82%;
      padding: 12px 12px;
      border-radius: 16px;
      border:1px solid var(--line);
      background: var(--other);
      color: var(--otherText);
      white-space: pre-wrap;
      word-break: break-word;
      font-size:16px;
      line-height:1.35;
    }
    .row.me .bubble{
    background: var(--me);
    color: var(--meText);
    border-color: transparent;
    border-bottom-right-radius: 6px;
    box-shadow: none;
    background-image: none;
    }
    .row.other .bubble{
      border-bottom-left-radius: 6px;
    }

    .meta{
      font-size:11px;
      color:var(--muted);
      display:flex;
      gap:8px;
      align-items:center;
    }
    .meta.me{ justify-content:flex-end; }
    .badgePending{ opacity:0.78; }
    .badgeFail{ color: var(--danger); font-weight:900; cursor:pointer; }

    .readBadge{
      font-weight:900;
      opacity:0.85;
    }

    .typingBar{
      position:fixed;
      left:0;
      right:0;
      bottom: calc(var(--composerH) + max(0px, calc(var(--kb) + var(--safeBComp) - var(--kbFix))));
      height: var(--typingH);
      display:none;
      align-items:center;
      padding: 0 12px;
      font-size:12px;
      color:var(--muted);
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      border-top:1px solid var(--line);
      z-index:19;
    }

    .composer{
      position:fixed;
      left:0;
      right:0;
      bottom: max(0px, calc(var(--kb) + var(--safeBComp) - var(--kbFix)));
      height: var(--composerH);
      padding: 10px 12px;
      border-top:1px solid var(--line);
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      display:flex;
      gap:10px;
      align-items:center;
      z-index:20;
    }

    .emojiBtn{
      width:48px;
      height:48px;
      border-radius: 14px;
      border:1px solid var(--line);
      background: #fff;
      font-size:22px;
      display:flex;
      align-items:center;
      justify-content:center;
      user-select:none;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
    }
    .emojiBtn:hover{ filter: brightness(0.98); }

    .inputWrap{
      flex:1;
      height:48px;
      border-radius: 14px;
      border:1px solid var(--line);
      background:#fff;
      display:flex;
      align-items:center;
      padding: 0 12px;
    }
    input[type="text"]{
      width:100%;
      border:0;
      outline:none;
      font-size:16px;
      background:transparent;
    }

    .sendBtn{
      width:64px;
      height:48px;
      border-radius: 14px;
      border:0;
      background:#111827;
      color:#fff;
      font-size:15px;
      font-weight:900;
      box-shadow: 0 10px 18px rgba(17,24,39,0.14);
    }
    .sendBtn:disabled{ opacity:0.45; box-shadow:none; }

    .emojiPanel{
      position:fixed;
      left:12px;
      right:12px;
      bottom: calc(var(--composerH) + max(0px, calc(var(--kb) + var(--safeBComp) - var(--kbFix))) + 10px);
      background:#fff;
      border:1px solid var(--line);
      border-radius: 16px;
      padding: 10px;
      box-shadow: var(--shadow);
      display:none;
      z-index:30;
    }
    .emojiPanel.open{ display:block; }
    .emojiGrid{
      display:grid;
      grid-template-columns: repeat(8, 1fr);
      gap:8px;
    }
    .emoji{
      height:38px;
      border-radius: 10px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      user-select:none;
      border:1px solid transparent;
    }
    .emoji:hover{ background:#f8fafc; }
    .emoji:active{ border-color: var(--line); }

    @media (max-width: 420px){
      .bubble{ max-width: 88%; }
      .emojiGrid{ grid-template-columns: repeat(7, 1fr); }
    }

    .modalOverlay{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,0.45);
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
      z-index:50;
    }
    .modalOverlay.open{ display:flex; }
    .modalCard{
      width:100%;
      max-width:420px;
      background:#fff;
      border:1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow2);
      padding: 14px;
    }
    .modalTitle{
      font-size:16px;
      font-weight:900;
      margin: 4px 0 8px 0;
    }
    .modalBody{
      font-size:13px;
      color:var(--muted);
      line-height:1.45;
      margin-bottom:10px;
      white-space:pre-wrap;
    }
    .modalCard input{
      width:100%;
      height:46px;
      border-radius: 14px;
      border:1px solid var(--line);
      padding: 0 12px;
      font-size:16px;
      outline:none;
      transition: box-shadow .18s ease, border-color .18s ease;
    }
    .modalCard input:focus{
      border-color: rgba(34,197,94,0.6);
      box-shadow: 0 0 0 4px rgba(34,197,94,0.12);
    }
    .modalBtnsRow{
      display:flex;
      gap:10px;
      margin-top:10px;
    }
    .modalBtnsRow .primaryBtn,
    .modalBtnsRow .ghostBtn{
      flex:1;
    }

    .msgCtxMenu{
      position:fixed;
      background:#fff;
      border:1px solid var(--line);
      border-radius:14px;
      box-shadow:0 14px 40px rgba(0,0,0,0.14);
      overflow:hidden;
      z-index:200;
      min-width:160px;
      display:none;
    }
    .msgCtxMenu.open{ display:block; }
    .msgCtxMenu button{
      width:100%;
      padding:11px 14px;
      border:0;
      background:#fff;
      text-align:left;
      font-size:14px;
      display:flex;
      align-items:center;
      gap:10px;
      cursor:pointer;
    }
    .msgCtxMenu button:hover{ background:#f8fafc; }
    .msgCtxMenu button.danger{ color:var(--danger); }
    .ctxSep{ height:1px; background:var(--line); }

    .quickReact{
      display:flex;
      gap:4px;
      padding:8px 10px;
      border-bottom:1px solid var(--line);
      flex-wrap:wrap;
    }
    .quickReact span{
      font-size:20px;
      cursor:pointer;
      padding:2px 4px;
      border-radius:8px;
      line-height:1.2;
      transition:transform .1s;
    }
    .quickReact span:hover{ transform:scale(1.3); }

    .editWrap{
      display:flex;
      gap:6px;
      align-items:center;
      margin-top:6px;
      flex-wrap:wrap;
    }
    .editInput{
      flex:1;
      min-width:0;
      border:1px solid rgba(34,197,94,0.5);
      border-radius:10px;
      padding:6px 10px;
      font-size:14px;
      outline:none;
      box-shadow:0 0 0 3px rgba(34,197,94,0.1);
    }
    .editSave, .editCancel{
      padding:5px 12px;
      border-radius:8px;
      border:0;
      font-size:13px;
      font-weight:700;
      cursor:pointer;
    }
    .editSave{ background:#111827; color:#fff; }
    .editCancel{ background:#f3f4f6; color:#374151; }

    .deletedBubble{
      font-style:italic;
      color:var(--muted);
      font-size:13px;
    }
    .editedMark{
      font-size:10px;
      color:var(--muted);
      margin-left:4px;
    }

    .reactionsBar{
      display:flex;
      flex-wrap:wrap;
      gap:4px;
      margin-top:4px;
    }
    .reactChip{
      display:inline-flex;
      align-items:center;
      gap:3px;
      padding:2px 8px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      font-size:13px;
      cursor:pointer;
      transition:background .15s, border-color .15s;
      user-select:none;
    }
    .reactChip:hover{ background:#f0fdf4; border-color:var(--accent); }
    .reactChip.mine{ background:#f0fdf4; border-color:var(--accent); }
    .reactCount{ font-size:11px; color:var(--muted); font-weight:700; }

    .linkPreview{
      margin-top:8px;
      border:1px solid var(--line);
      border-radius:12px;
      overflow:hidden;
      background:#f8fafc;
      cursor:pointer;
      text-decoration:none;
      color:inherit;
      display:block;
      max-width:100%;
    }
    .linkPreview:hover{ background:#f0f4f8; }
    .lpImg{
      width:100%;
      max-height:140px;
      object-fit:cover;
      display:block;
    }
    .lpBody{
      padding:10px 12px;
    }
    .lpSite{
      font-size:10px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.5px;
      margin-bottom:3px;
    }
    .lpTitle{
      font-size:13px;
      font-weight:700;
      line-height:1.3;
      word-break:break-word;
      overflow:hidden;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
    }
    .lpDesc{
      font-size:11px;
      color:var(--muted);
      margin-top:3px;
      overflow:hidden;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
    }

    .replyPreview{
      position:absolute;
      bottom: calc(100% + 2px);
      left:0; right:0;
      background: rgba(255,255,255,0.97);
      border-top: 1px solid var(--line);
      padding: 8px 12px;
      display:flex;
      align-items:center;
      gap:8px;
      font-size:12px;
      color: var(--muted);
      backdrop-filter: blur(8px);
      z-index:21;
    }
    .replyPreviewBar{
      width:3px;
      height:100%;
      min-height:28px;
      background: var(--accent);
      border-radius:2px;
      flex-shrink:0;
    }
    .replyPreviewText{
      flex:1;
      min-width:0;
      overflow:hidden;
      white-space:nowrap;
      text-overflow:ellipsis;
    }
    .replyPreviewName{
      font-weight:700;
      color: var(--accent);
      margin-bottom:2px;
    }
    .replyCloseBtn{
      border:0;
      background:none;
      font-size:18px;
      cursor:pointer;
      color:var(--muted);
      flex-shrink:0;
      padding:0 4px;
      line-height:1;
    }

    .replyQuote{
      border-left: 3px solid var(--accent);
      padding: 5px 10px;
      border-radius: 0 8px 8px 0;
      background: rgba(34,197,94,0.07);
      margin-bottom: 6px;
      font-size:12px;
      color: var(--muted);
      cursor: pointer;
      max-width: 100%;
      overflow:hidden;
    }
    .replyQuote:hover{ background: rgba(34,197,94,0.12); }
    .replyQuoteName{
      font-weight:700;
      color: var(--accent);
      margin-bottom:2px;
    }
    .replyQuoteText{
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .toast{
      position:fixed;
      bottom:calc(var(--composerH) + max(0px, calc(var(--kb) + var(--safeBComp) - var(--kbFix))) + 12px);
      left:50%;
      transform:translateX(-50%) translateY(20px);
      background:#111827;
      color:#fff;
      padding:9px 18px;
      border-radius:999px;
      font-size:13px;
      font-weight:700;
      opacity:0;
      transition:opacity .2s, transform .2s;
      pointer-events:none;
      z-index:400;
      white-space:nowrap;
    }
    .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  </style>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "90c2ab9b-c948-4b4d-8f1e-56326f9b7aea"
    });
    window._OS = window.__OS = OneSignal;
    
    // 알림 클릭 시 처리
    OneSignal.Notifications.addEventListener('click', function(notification) {
      const url = notification.notification.launchURL;
      if (url) {
        window.location.href = url;
      }
    });

    // 알림 수신 시 배지 업데이트
    OneSignal.Notifications.addEventListener('foreground', function(notification) {
      window.__updateBadge && window.__updateBadge();
    });

    try{
      OneSignal.User.PushSubscription.addEventListener("change", function(){
        window.__schedulePushSync && window.__schedulePushSync();
      });
      window.__schedulePushSync && window.__schedulePushSync();
    }catch(e){}
  });
</script>
</head>
<body>
  <div class="app" id="app">
    <header id="header" style="display:none;">
      <div class="headTop">
        <div>
          <div class="title" id="roomTitle">채팅방</div>
          <div class="sub" id="roomSub"></div>

    function _bytesToHex(u8){
      return Array.from(u8).map(b => b.toString(16).padStart(2,'0')).join('');
    }
    function randomSaltHex(len){
      try{
        const u = new Uint8Array(len || 16);
        (crypto && crypto.getRandomValues) ? crypto.getRandomValues(u) : u.forEach((_,i)=>u[i]=Math.floor(Math.random()*256));
        return _bytesToHex(u);
      }catch(e){
        return String(Math.random()).slice(2) + String(Date.now());
      }
    }
    async function sha256Hex(str){
      if (!(crypto && crypto.subtle && crypto.subtle.digest)){
        throw new Error('이 브라우저는 필요한 암호화 기능(crypto.subtle)을 지원하지 않습니다.');
      }
      const enc = new TextEncoder();
      const buf = await crypto.subtle.digest('SHA-256', enc.encode(String(str || '')));
      return _bytesToHex(new Uint8Array(buf));
    }
    async function makeRoomPassHash(pass, salt){
      return await sha256Hex('roompass|' + String(pass || '') + '|' + String(salt || ''));
    }

    async function ensureRoomAccess(info){
      try{
        if (!info || !info.passEnabled) return true;
        const rid = String(info.roomId || '');
        const ver = Number(info.passVer || 0);
        const salt = String(info.passSalt || '');
        const passHash = String(info.passHash || '');
        if (!rid || !passHash) return true;

        const saved = getRoomAuth(rid);
        if (saved && saved.ver === ver && saved.hash === passHash) return true;

        for (let i=0; i<3; i++){
          const res = await openPassModal({
            mode: 'verify',
            title: '비밀번호 입력',
            body: '이 방은 비밀번호가 필요합니다.',
            okText: '입장',
            showRemove: false
          });
          if (!res) return false;
          const pass = String(res.value || '').trim();
          if (!pass){
            alert('비밀번호를 입력해 주세요.');
            continue;
          }
          const calc = await makeRoomPassHash(pass, salt);
          if (calc === passHash){
            setRoomAuth(rid, { ver: ver, hash: passHash, at: Date.now() });
            return true;
          }
          alert('비밀번호가 올바르지 않습니다.');
        }
        return false;
      }catch(e){
        alert('비밀번호 확인 중 오류가 발생했습니다.');
        return false;
      }
    }

    async function setRoomPassword(rid, pass){
      const salt = randomSaltHex(16);
      const hash = await makeRoomPassHash(String(pass || ''), salt);
      const verRef = db.ref('rooms/' + rid + '/passVer');
      const tx = await verRef.transaction(cur => (Number(cur || 0) + 1));
      const newVer = Number((tx && tx.snapshot && tx.snapshot.val()) || 1);
      await db.ref('rooms/' + rid).update({
        passEnabled: true,
        passSalt: salt,
        passHash: hash,
        passVer: newVer,
        updatedAt: SV.TIMESTAMP
      });
      setRoomAuth(rid, { ver: newVer, hash: hash, at: Date.now() });
      return { ver: newVer, hash };
    }

    async function removeRoomPassword(rid){
      const verRef = db.ref('rooms/' + rid + '/passVer');
      const tx = await verRef.transaction(cur => (Number(cur || 0) + 1));
      const newVer = Number((tx && tx.snapshot && tx.snapshot.val()) || 1);
      await db.ref('rooms/' + rid).update({
        passEnabled: false,
        passSalt: null,
        passHash: null,
        passVer: newVer,
        updatedAt: SV.TIMESTAMP
      });
      clearRoomAuth(rid);
      return { ver: newVer };
    }

      "data:audio/wav;base64," +
      "UklGRiQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQAAAAA=";

    async function unlockAudioHard(){
      try{
        if (!audioCtx){
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state !== 'running'){
          await audioCtx.resume();
        }
        audioReady = true;
      }catch(e){
        audioReady = false;
      }

      try{
        beepAudio.currentTime = 0;
        await beepAudio.play();
        beepAudio.pause();
        beepAudio.currentTime = 0;
      }catch(e){}
    }

    function playBeep(){
      if (!soundEnabled) return;

      if (audioCtx && audioReady){
        try{
          const o = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          o.type = 'sine';
          o.frequency.value = 880;
          g.gain.value = 0.0001;
          o.connect(g);
          g.connect(audioCtx.destination);

          const now = audioCtx.currentTime;
          g.gain.setValueAtTime(0.0001, now);
          g.gain.exponentialRampToValueAtTime(0.15, now + 0.01);
          g.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
          o.start(now);
          o.stop(now + 0.2);
          return;
        }catch(e){}
      }

      try{
        const a = new Audio(BEEP_WAV);
        a.playsInline = true;
        a.currentTime = 0;
        a.play().catch(()=>{});
      }catch(e){}
    }

    async function enableNotificationsFromUserGesture(){
      if (isIOS() && !isStandalonePWA()){
        alert('iPhone Safari(브라우저)에서는 시스템 알림이 지원되지 않습니다.\n(홈 화면에 추가(PWA) 형태에서는 가능할 수 있습니다.)');
        return;
      }

      if (!('Notification' in window)){
        alert('이 브라우저는 시스템 알림을 지원하지 않습니다.');
        return;
      }

      if (isInIframe()){
        showOpenNewTabGuide();
        alert('현재 페이지가 임베드(iframe)로 열려 있어 알림 권한 요청이 차단될 수 있습니다.\n메뉴 하단 안내에 생긴 "새 탭으로 열기" 링크로 열린 탭에서 다시 시도해 주세요.');
        return;
      }

      try{
        const perm = await Notification.requestPermission();
        if (perm === 'granted'){
          notifyEnabled = true;
          localStorage.setItem(LS_NOTI, '1');
          await unlockAudioHard();
          updateMenuStates();

          try{
            if (window.__OS && window.__OS.User && window.__OS.User.PushSubscription){
              window.__OS.User.PushSubscription.optIn();
              window.__schedulePushSync && window.__schedulePushSync();
            }
          }catch(e){}

          alert('알림이 켜졌습니다.');
        } else if (perm === 'denied'){
          notifyEnabled = false;
          localStorage.setItem(LS_NOTI, '0');
          updateMenuStates();
          alert('알림이 차단되어 있습니다.\n브라우저 사이트 설정에서 알림을 "허용"으로 바꿔 주세요.');
        } else {
          notifyEnabled = false;
          localStorage.setItem(LS_NOTI, '0');
          updateMenuStates();
          alert('알림 권한이 허용되지 않았습니다.');
        }
      }catch(e){
        alert('알림 설정에 실패했습니다.');
      }
    }

    async function renderLinkPreview(url, container){
      try{
        const proxy = 'https://api.allorigins.win/get?url=' + encodeURIComponent(url);
        const res = await fetch(proxy, { signal: AbortSignal.timeout(5000) });
        if (!res.ok) return;
        const json = await res.json();
        const html = json.contents || '';
        const doc = new DOMParser().parseFromString(html, 'text/html');

        const getMeta = (prop) => {
          const el = doc.querySelector(`meta[property="${prop}"],meta[name="${prop}"]`);
          return el ? el.getAttribute('content') : '';
        };

        const title = getMeta('og:title') || doc.title || '';
        const desc  = getMeta('og:description') || getMeta('description') || '';
        const img   = getMeta('og:image') || '';
        const site  = getMeta('og:site_name') || (new URL(url)).hostname;

        if (!title) return;

        const a = document.createElement('a');
        a.className = 'linkPreview';
        a.href = url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';

        if (img){
          const im = document.createElement('img');
          im.className = 'lpImg';
          im.src = img;
          im.alt = '';
          im.onerror = () => im.remove();
          a.appendChild(im);
        }

        const body = document.createElement('div');
        body.className = 'lpBody';
        body.innerHTML = `
          <div class="lpSite">${escapeHtml(site)}</div>
          <div class="lpTitle">${escapeHtml(title)}</div>
          ${desc ? `<div class="lpDesc">${escapeHtml(desc)}</div>` : ''}
        `;
        a.appendChild(body);
        container.appendChild(a);
      }catch(e){}
    }

    const reactionWatchers = new Map();

    function watchReactions(mid, reactionsBar, isMine){
      if (reactionWatchers.has(mid)) return;
      const ref = db.ref('reactions/' + roomId + '/' + mid);
      reactionWatchers.set(mid, ref);

      ref.on('value', snap => {
        const data = snap.val() || {};
        reactionsBar.innerHTML = '';
        const tally = {};
        const myReact = {};
        Object.entries(data).forEach(([uid, emoji]) => {
          tally[emoji] = (tally[emoji] || 0) + 1;
          if (uid === myUid) myReact[emoji] = true;
        });
        Object.entries(tally).forEach(([emoji, count]) => {
          const chip = document.createElement('div');
          chip.className = 'reactChip' + (myReact[emoji] ? ' mine' : '');
          chip.innerHTML = `${emoji} <span class="reactCount">${count}</span>`;
          chip.addEventListener('click', () => toggleReaction(mid, emoji));
          reactionsBar.appendChild(chip);
        });
        scrollToBottom(false);
      });
    }

    async function toggleReaction(mid, emoji){
      try{
        const ref = db.ref('reactions/' + roomId + '/' + mid + '/' + myUid);
        const snap = await ref.once('value');
        if (snap.val() === emoji){
          await ref.remove();
        } else {
          await ref.set(emoji);
        }
      }catch(e){}
    }

    function rebuildBubble(bubble, m, wrapEl){
      bubble.innerHTML = '';
      if (m.deleted){
        bubble.className = 'bubble deletedBubble';
        bubble.textContent = '삭제된 메시지입니다.';
        return;
      }
      bubble.className = 'bubble';
      if (m.replyTo && m.replyTo.text){
        bubble.appendChild(buildQuoteEl(m.replyTo));
      }
      bubble.appendChild(document.createTextNode(String(m.text || '')));
      if (m.edited){
        const em = document.createElement('span');
        em.className = 'editedMark';
        em.textContent = '(수정됨)';
        bubble.appendChild(em);
      }
    }

    function renderMessage(m, opt){
      if (seen.has(m.messageId)) return;
      const isMine = (m.senderId === myUid);

      const wrap = document.createElement('div');
      wrap.className = 'msg';
      wrap.dataset.mid = m.messageId;
      wrap.dataset.seq = m.seq || 0; // seq 속성 추가

      const row = document.createElement('div');
      row.className = 'row ' + (isMine ? 'me' : 'other');

      const bubble = document.createElement('div');
      rebuildBubble(bubble, m, wrap);

      if (!opt?.pending && !m.deleted){
        const url = extractUrl(String(m.text || ''));
        if (url) renderLinkPreview(url, wrap);
      }

      row.appendChild(bubble);
      wrap.appendChild(row);

      const reactionsBar = document.createElement('div');
      reactionsBar.className = 'reactionsBar';
      const reactAlign = document.createElement('div');
      reactAlign.style.cssText = isMine ? 'display:flex;justify-content:flex-end' : 'display:flex;justify-content:flex-start';
      reactAlign.appendChild(reactionsBar);
      wrap.appendChild(reactAlign);
      if (!opt?.pending && !m.deleted) watchReactions(m.messageId, reactionsBar, isMine);

      const meta = document.createElement('div');
      meta.className = 'meta ' + (isMine ? 'me' : '');
      const who = document.createElement('span');
      who.textContent = m.senderNick || '';
      const time = document.createElement('span');
      time.textContent = fmt(m.ts || Date.now());
      meta.appendChild(who);
      meta.appendChild(time);

      if (isMine && opt?.pending){
        const b = document.createElement('span');
        b.className = 'badgePending';
        b.textContent = '전송 중';
        meta.appendChild(b);
      }

      wrap.appendChild(meta);

      if (!m.deleted){
        let longTimer = null;
        const openCtx = (e) => {
          e.preventDefault();
          openMsgMenu(m.messageId, m.senderId, wrap, bubble);
        };
        wrap.addEventListener('contextmenu', openCtx);
        wrap.addEventListener('touchstart', () => { longTimer = setTimeout(() => openMsgMenu(m.messageId, m.senderId, wrap, bubble), 550); }, { passive:true });
        wrap.addEventListener('touchend', () => { clearTimeout(longTimer); });
        wrap.addEventListener('touchmove', () => { clearTimeout(longTimer); });
      }

      logEl.appendChild(wrap);
      seen.set(m.messageId, { seq: Number(m.seq || 0), metaEl: meta, senderId: m.senderId, wrapEl: wrap, bubbleEl: bubble, text: String(m.text || ''), replyTo: m.replyTo || null });
    }

    function applyMsgUpdate(m){
      const obj = seen.get(m.messageId);
      if (!obj) return;
      const bubble = obj.bubbleEl;
      if (!bubble) return;

      const fullMsg = {
        text: String(m.text || ''),
        deleted: !!m.deleted,
        edited: !!m.edited,
        replyTo: obj.replyTo || null
      };
      rebuildBubble(bubble, fullMsg, obj.wrapEl);

      obj.text = fullMsg.text;
    }

    function updateBadges(){
      for (const [mid, obj] of seen.entries()){
        const meta = obj.metaEl;
        if (!meta) continue;

        Array.from(meta.querySelectorAll('.badgePending, .badgeFail')).forEach(n => n.remove());

        if (obj.senderId !== myUid) continue;

        if (pending.has(mid)) {
          const p = pending.get(mid);
          const age = Date.now() - p.createdAt;
          if (age > 12000) {
            const b = document.createElement('span');
            b.className = 'badgeFail';
            b.textContent = '전송 실패(재시도)';
            b.addEventListener('click', () => retrySend(mid));
            meta.appendChild(b);
          } else {
            const b = document.createElement('span');
            b.className = 'badgePending';
            b.textContent = '전송 중';
            meta.appendChild(b);
          }
        }
      }
    }

    function updateReadBadges(){
      // 구독자만 제외 (입장한 사용자만 카운트)
      const otherUids = Object.keys(readsCache || {}).filter(uid => uid !== myUid);
      const totalOthers = otherUids.length;

      for (const [mid, obj] of seen.entries()){
        if (obj.senderId !== myUid) continue;
        const meta = obj.metaEl;
        if (!meta) continue;

        Array.from(meta.querySelectorAll('.readBadge')).forEach(n => n.remove());

        const seq = Number(obj.seq || 0);
        if (!seq) continue;
        if (pending.has(mid)) continue;

        let readers = 0;
        for (const uid of otherUids){
          const lastRead = Number((readsCache[uid] && readsCache[uid].lastReadSeq) || 0);
          if (lastRead >= seq) readers += 1;
        }

        const badge = document.createElement('span');
        badge.className = 'readBadge';

        if (totalOthers <= 1){
          badge.textContent = (readers >= 1) ? '읽음' : '안읽음';
        } else {
          badge.textContent = `읽음 ${readers}/${totalOthers}`;
        }

        meta.appendChild(badge);
      }
    }

    function mergeServerMessage(m){
      const wasPending = pending.has(m.messageId);

      if (!seen.has(m.messageId)){
        renderMessage(m, {pending:false});
      } else if (wasPending) {
        const obj = seen.get(m.messageId);
        if (obj && obj.bubbleEl && !m.deleted) {
          rebuildBubble(obj.bubbleEl, m, obj.wrapEl);

          const url = extractUrl(String(m.text || ''));
          if (url) renderLinkPreview(url, obj.wrapEl);

          const reactionsBar = obj.wrapEl && obj.wrapEl.querySelector('.reactionsBar');
          if (reactionsBar && !reactionWatchers.has(m.messageId)){
            watchReactions(m.messageId, reactionsBar, true);
          }
        }
      }

      if (wasPending) pending.delete(m.messageId);

      const obj = seen.get(m.messageId);
      if (obj){
        obj.seq = Number(m.seq || obj.seq || 0);
        if (m.text !== undefined) obj.text = String(m.text || '');
        if (m.replyTo !== undefined) obj.replyTo = m.replyTo || null;
      }

      updateBadges();
      updateReadBadges();
    }

    function createLoadMoreButton(){

    async function loadMoreMessages(){
      if (isLoadingMore || !hasMoreMessages || !roomId) return;
      
      const btn = document.getElementById('loadMoreBtn');
      if (btn) {
        btn.classList.add('loading');
        btn.textContent = '로딩 중...';
      }

      isLoadingMore = true;

      try{
        // 현재 로드된 메시지 중 가장 오래된 seq 찾기
        let oldestSeq = Infinity;
        for (const [mid, obj] of seen.entries()){
          const seq = Number(obj.seq || 0);
          if (seq > 0 && seq < oldestSeq) oldestSeq = seq;
        }

        if (oldestSeq === Infinity || oldestSeq <= 0) {
          hasMoreMessages = false;
          isLoadingMore = false;
          if (btn) btn.remove();
          return;
        }

        // 이전 메시지들 로드 (seq < oldestSeq, 역순으로 최신 PAGE_SIZE개)
        const snap = await db.ref('messages/' + roomId)
          .orderByChild('seq')
          .endAt(oldestSeq - 1)
          .limitToLast(PAGE_SIZE + 1)
          .once('value');

        const items = [];
        snap.forEach(child => {
          const m = child.val();
          if (!m) return;
          items.push({
            roomId: roomId,
            messageId: String(m.messageId || child.key || ''),
            senderId: String(m.senderId || ''),
            senderNick: String(m.senderNick || ''),
            text: String(m.text || ''),
            ts: Number(m.ts || 0),
            seq: Number(m.seq || 0),
            deleted: !!m.deleted,
            edited: !!m.edited,
            replyTo: m.replyTo || null
          });
        });

        // seq 오름차순 정렬 (낡은 것부터)
        items.sort((a, b) => a.seq - b.seq);

        if (items.length === 0){
          hasMoreMessages = false;
          isLoadingMore = false;
          if (btn) btn.remove();
          return;
        }

        // 기존 로드된 메시지 DOM 위치 저장
        const scrollPosBefore = logEl.scrollHeight;

        // 새 메시지들을 "이전 대화 보기" 버튼 다음에 삽입
        const existingBtn = document.getElementById('loadMoreContainer');
        items.forEach(msg => {
          if (!seen.has(msg.messageId)){
            renderMessage(msg, {pending: false});
            loadedMessageCount++;
          }
        });

        // 스크롤 위치 조정 (사용자 관점에서 같은 메시지에 머물러있게)
        const scrollPosAfter = logEl.scrollHeight;
        logEl.scrollTop = logEl.scrollTop + (scrollPosAfter - scrollPosBefore);

        // "이전 대화 보기" 버튼 위치 이동 (최상단)
        if (existingBtn) existingBtn.remove();
        const newBtn = createLoadMoreButton();
        logEl.insertBefore(newBtn, logEl.firstChild);

        if (items.length < PAGE_SIZE) {
          hasMoreMessages = false;
          document.getElementById('loadMoreBtn')?.remove();
        }
      }catch(e){
        console.error('Load more failed:', e);
        hasMoreMessages = false;
      }

      isLoadingMore = false;
      if (btn) {
        btn.classList.remove('loading');
        btn.textContent = '이전 대화 보기';
      }
    }

    function subscribeMessages(rid, startSeq){
      stopMessages();
      stopReactionWatchers();

      logEl.innerHTML = '';
      seen.clear();
      pending.clear();
      afterSeq = Number(startSeq || 0);
      loadedMessageCount = 0;
      isLoadingMore = false;
      hasMoreMessages = true;

      let initialLoadDone = false;

      const ref = db.ref('messages/' + rid).orderByChild('seq').startAt(afterSeq + 1);
      msgUnsub = ref;

      ref.once('value', () => {
        initialLoadDone = true;
        requestAnimationFrame(() => {
          logEl.scrollTop = logEl.scrollHeight;
          setTimeout(() => { logEl.scrollTop = logEl.scrollHeight; }, 120);
        });
      });

      ref.on('child_added', snap => {
        const m = snap.val();
        if (!m) return;

        const msg = {
          roomId: rid,
          messageId: String(m.messageId || snap.key || ''),
          senderId: String(m.senderId || ''),
          senderNick: String(m.senderNick || ''),
          text: String(m.text || ''),
          ts: Number(m.ts || 0),
          seq: Number(m.seq || 0),
          deleted: !!m.deleted,
          edited: !!m.edited,
          replyTo: m.replyTo || null
        };

        afterSeq = Math.max(afterSeq, msg.seq || 0);

        // 메시지 seq 기준으로 올바른 위치에 삽입
        if (initialLoadDone && seen.size > 0) {
          // 이미 로드된 메시지 사이에 삽입 필요
          let insertedPos = false;
          const allWraps = Array.from(logEl.querySelectorAll('[data-mid]'));
          for (let i = 0; i < allWraps.length; i++){
            const existingSeq = Number(allWraps[i].dataset.seq || 0);
            if (msg.seq < existingSeq){
              // 이 메시지 앞에 삽입
              const newWrap = document.createElement('div');
              newWrap.className = 'msg';
              newWrap.dataset.mid = msg.messageId;
              newWrap.dataset.seq = msg.seq;
              
              const row = document.createElement('div');
              row.className = 'row ' + (msg.senderId === myUid ? 'me' : 'other');
              const bubble = document.createElement('div');
              rebuildBubble(bubble, msg, newWrap);
              row.appendChild(bubble);
              newWrap.appendChild(row);
              
              const reactionsBar = document.createElement('div');
              reactionsBar.className = 'reactionsBar';
              const reactAlign = document.createElement('div');
              reactAlign.style.cssText = (msg.senderId === myUid) ? 'display:flex;justify-content:flex-end' : 'display:flex;justify-content:flex-start';
              reactAlign.appendChild(reactionsBar);
              newWrap.appendChild(reactAlign);
              
              const meta = document.createElement('div');
              meta.className = 'meta ' + (msg.senderId === myUid ? 'me' : '');
              const who = document.createElement('span');
              who.textContent = msg.senderNick || '';
              const time = document.createElement('span');
              time.textContent = fmt(msg.ts || Date.now());
              meta.appendChild(who);
              meta.appendChild(time);
              newWrap.appendChild(meta);
              
              allWraps[i].parentNode.insertBefore(newWrap, allWraps[i]);
              seen.set(msg.messageId, { seq: msg.seq, metaEl: meta, senderId: msg.senderId, wrapEl: newWrap, bubbleEl: bubble, text: String(msg.text || ''), replyTo: msg.replyTo || null });
              insertedPos = true;
              break;
            }
          }
          if (!insertedPos){
            mergeServerMessage(msg);
          }
        } else {
          mergeServerMessage(msg);
        }

        if (initialLoadDone) {
          if (msg.senderId !== myUid) {
            if (document.hidden || !document.hasFocus()) {
              bumpUnread();
            } else {
              if (shouldNotifyNow()) {
                bumpUnread();
                playBeep();
              } else {
                if (isNearBottom()) clearUnread();
              }
            }
          }
          scrollToBottom(false);
          markReadNow();
        }
      });

      ref.on('child_changed', snap => {
        const m = snap.val();
        if (!m) return;
        applyMsgUpdate({
          messageId: String(m.messageId || snap.key || ''),
          text: String(m.text || ''),
          deleted: !!m.deleted,
          edited: !!m.edited,
          type: String(m.type || '')
        });
      });
    }

        passEnabled: (r.passEnabled === true),
        passVer: Number(r.passVer || 0),
        passSalt: String(r.passSalt || ''),
        passHash: String(r.passHash || '')
      };
    }

    async function enterRoomLocal(rid, infoOpt){
      stopMessages();
      stopPresence();
      stopTyping();
      stopReads();

      const info = infoOpt || await loadRoomInfo(rid);
      if (!info){
        showHome();
        return;
      }

      const ok = (info && info._accessOk === true) ? true : await ensureRoomAccess(info);
      if (!ok){
        try{ history.pushState({}, '', NAV_URL); }catch(e){}
        roomId = '';
        showHome();
        return;
      }

      roomId = String(rid || '');
      roomName = info.roomName;
      ownerUid = info.ownerUid;
      ownerNick = info.ownerNick;
      isOwner = (ownerUid && ownerUid === myUid);
      isJoined = true; // 입장 상태 표시
      isSubbed = isSubscribed(rid); // 구독 여부 확인

      db.ref('roomMembers/' + roomId + '/' + myUid).set({
        nick: myNick,
        joinedAt: SV.TIMESTAMP
      }).catch(()=>{});

      clearUnread();

      showChat();
      setHeader([]);
      startPresence(roomId);
      startTyping(roomId);
      startReads(roomId);

      subscribeMessages(roomId, 0);
      
      updateMenuStates();
    }

    function showChat(){
      home.style.display = 'none';
      header.style.display = 'block';
      logEl.style.display = 'block';
      composer.style.display = 'flex';
      refreshViewportLayoutSoon();
      inputEl.focus();
      refreshViewportLayoutSoon();
    }

    function showHome(){
      stopMessages();
      stopPresence();
      stopTyping();
      stopReads();
      clearUnread();
      try{ clearReply(); }catch(e){}

      isJoined = false;
      isSubbed = false;

      header.style.display = 'none';
      logEl.style.display = 'none';
      composer.style.display = 'none';
      showTypingBar('');
      home.style.display = 'block';
      refreshViewportLayoutSoon();
      refreshRooms();
    }

    mLeave.addEventListener('click', () => {
      closeMenu();
      history.pushState({}, '', NAV_URL);
      roomId = '';
      showHome();
    });

    mUnsubscribe.addEventListener('click', async () => {
      closeMenu();
      if (!roomId) return;
      await toggleSubscribe(roomId);
      await refreshRooms();
    });

    mNick.addEventListener('click', async () => {
      closeMenu();
      const next = prompt('새 닉네임을 입력해 주세요.', myNick || '');
      if (!next) return;
      if (!setNick(next)) return;

      homeNick.value = myNick;
      if (roomId){
        try{
          db.ref('presence/' + roomId + '/' + myUid).update({ nick: myNick, lastActive: SV.TIMESTAMP });
          db.ref('typing/' + roomId + '/' + myUid).update({ nick: myNick }).catch(()=>{});
          db.ref('reads/' + roomId + '/' + myUid).update({ nick: myNick }).catch(()=>{});
        }catch(e){}
      }
      setHeader([]);
    });

    mRoomName.addEventListener('click', async () => {
      closeMenu();
      if (!roomId) return;
      if (!isOwner){
        alert('방장만 방 이름을 변경할 수 있습니다.');
        return;
      }
      const next = prompt('새 방 이름을 입력해 주세요.', roomName || '');
      if (!next) return;

      const newName = String(next).trim().slice(0, 60);
      if (!newName) return;

      try{
        await db.ref('rooms/' + roomId).update({ roomName: newName, updatedAt: SV.TIMESTAMP });
        roomName = newName;
        setHeader([]);
        alert('방 이름을 변경했습니다.');
      }catch(e){
        alert('변경 실패: ' + (e && e.message ? e.message : ''));
      }
    });

    mRoomPass.addEventListener('click', async () => {
      closeMenu();
      if (!roomId) return;
      if (!isOwner){
        alert('방장만 비밀번호를 변경할 수 있습니다.');
        return;
      }

      const info = await loadRoomInfo(roomId);
      if (!info){
        alert('방 정보를 불러오지 못했습니다.');
        return;
      }

      const bodyLines = [];
      bodyLines.push(info.passEnabled ? '현재: 비밀번호 있음' : '현재: 비밀번호 없음');
      bodyLines.push('');
      bodyLines.push('새 비밀번호를 입력하면 설정/변경됩니다.');
      bodyLines.push('비밀번호 제거를 누르면 비밀번호 없이 입장할 수 있게 됩니다.');

      const res = await openPassModal({
        mode: 'owner',
        title: '비밀번호 설정/변경',
        body: bodyLines.join('\n'),
        okText: '저장',
        showRemove: true,
        removeText: '비밀번호 제거'
      });
      if (!res) return;

      try{
        if (res.action === 'remove'){
          await removeRoomPassword(roomId);
          alert('비밀번호를 제거했습니다.');
        } else if (res.action === 'ok'){
          const pw = String(res.value || '').trim();
          if (!pw){
            alert('비밀번호를 입력해 주세요.');
            return;
          }
          await setRoomPassword(roomId, pw);
          alert('비밀번호를 설정했습니다.');
        }
      }catch(e){
        alert('처리 실패: ' + (e && e.message ? e.message : ''));
      }
    });

    function onInput(){
      sendBtn.disabled = !inputEl.value.trim();
      if (roomId) markTypingActivity();
    }
    inputEl.addEventListener('input', onInput);
    inputEl.addEventListener('focus', refreshViewportLayoutSoon);
    inputEl.addEventListener('click', refreshViewportLayoutSoon);
    inputEl.addEventListener('touchstart', refreshViewportLayoutSoon, { passive:true });
    inputEl.addEventListener('blur', () => {
      setTimeout(updateKeyboardInset, 60);
      setTimeout(updateKeyboardInset, 220);
    });
    document.addEventListener('focusin', (e) => {
      if (e && e.target === inputEl) refreshViewportLayoutSoon();
    });

    function msgId(){
      if (crypto && crypto.randomUUID) return crypto.randomUUID();
      return 'm' + Date.now() + '_' + Math.random().toString(16).slice(2);
    }

    async function collectOtherSubscriptionIds(rid){
      try{
        const membersSnap = await db.ref('roomMembers/' + rid).once('value');
        const members = membersSnap.val() || {};
        let otherUids = Object.keys(members).filter(uid => uid !== myUid);

        if (!otherUids.length) return [];

        try{
          const presSnap = await db.ref('presence/' + rid).once('value');
          const pres = presSnap.val() || {};
          const now = Date.now();
          const ACTIVE_MS = 35000;

          otherUids = otherUids.filter(uid => {
            const p = pres[uid] || {};
            const ts = Number(p.lastActive || 0);
            const vis = String(p.vis || '');
            const activeVisible = (vis === 'visible') && ts && ((now - ts) <= ACTIVE_MS);
            return !activeVisible;
          });

          if (!otherUids.length) return [];
        }catch(e){}

        const subsSnaps = await Promise.all(
          otherUids.map(uid => db.ref('pushSubs/' + uid).once('value'))
        );

        const ids = subsSnaps
          .flatMap(s => Object.keys(s.val() || {}))
          .filter(Boolean);

        return Array.from(new Set(ids));
      }catch(e){
        return [];
      }
    }

    async function sendToFirebase(mid, text, replyToData){
      if (!roomId) return;

      const roomRef = db.ref('rooms/' + roomId + '/lastSeq');

      try{
        const tx = await roomRef.transaction(cur => (Number(cur || 0) + 1));
        const seq = Number((tx && tx.snapshot && tx.snapshot.val()) || 0);

        const msg = {
          messageId: mid,
          senderId: myUid,
          senderNick: myNick,
          text: String(text || '').slice(0, 4000),
          ts: SV.TIMESTAMP,
          seq: seq
        };
        if (replyToData) msg.replyTo = replyToData;

        await db.ref('messages/' + roomId).push(msg);
        await db.ref('rooms/' + roomId).update({ updatedAt: SV.TIMESTAMP, lastMsgTs: SV.TIMESTAMP });

        try{
          const subIds = await collectOtherSubscriptionIds(roomId);
          if (subIds.length){
            const title = roomName || 'Chat';
            const body = String(text || '').slice(0, 120);
            pushToSubscriptions(subIds, title, body, roomId);
          }
        }catch(e){}

      }catch(e){
        updateBadges();
      }
    }

    function retrySend(mid){
      const p = pending.get(mid);
      if (!p) return;
      p.createdAt = Date.now();
      pending.set(mid, p);
      updateBadges();
      sendToFirebase(mid, p.text);
    }

    function send(){
      const text = inputEl.value;
      if (!text.trim()) return;
      if (!roomId) return;

      const mid = msgId();

      let replyToData = null;
      if (currentReplyTo){
        replyToData = { ...currentReplyTo };
        clearReply();
      }

      const local = {
        roomId,
        messageId: mid,
        senderId: myUid,
        senderNick: myNick,
        text: text,
        ts: Date.now(),
        seq: 0,
        replyTo: replyToData
      };

      renderMessage(local, {pending:true});
      scrollToBottom(true);

      pending.set(mid, { text, createdAt: Date.now() });
      updateBadges();

      inputEl.value = '';
      onInput();

      try{ db.ref('typing/' + roomId + '/' + myUid).remove(); }catch(e){}
      typingOn = false;

      sendToFirebase(mid, text, replyToData);
    }

    function safeFocusInput(){
      try{ inputEl.focus({ preventScroll:true }); }
      catch(e){ try{ inputEl.focus(); }catch(e2){} }
    }

    sendBtn.addEventListener('pointerdown', async (e) => {
      e.preventDefault();
      if (soundEnabled) { await unlockAudioHard(); }
      send();
      safeFocusInput();
    });

    inputEl.addEventListener('keydown', async (e) => {
      if (e.key === 'Enter'){
        e.preventDefault();
        if (soundEnabled) { await unlockAudioHard(); }
        send();
        safeFocusInput();
      }
    });

    async function init(){
      updateFirebaseStatus();

      if (myNick) homeNick.value = myNick;

      try{
        const cred = await firebase.auth().signInAnonymously();
        myUid = (cred && cred.user && cred.user.uid) ? cred.user.uid : (firebase.auth().currentUser ? firebase.auth().currentUser.uid : '');
        schedulePushSync();
      }catch(e){
        firebaseError = '❌ 익명 로그인 실패: ' + (e?.message || e);
        console.error(firebaseError);
        updateFirebaseStatus();
        alert(firebaseError + '\n\nFirebase Authentication에서 익명 로그인이 활성화되었는지 확인해주세요.');
        return;
      }

      applyMyBubbleTheme();
      updateMenuStates();

      if (INIT_ROOM_ID){
        if (!myNick){
          showHome();
          return;
        }
        const rid = String(INIT_ROOM_ID||'').trim();
        if (!rid){
          showHome();
          return;
        }
        await enterRoomLocal(rid);
        return;
      }

      showHome();
    }

    const msgCtxMenu = document.getElementById('msgCtxMenu');
    const ctxEdit = document.getElementById('ctxEdit');
    const ctxDelete = document.getElementById('ctxDelete');
    const quickReactBar = document.getElementById('quickReactBar');

    let ctxTargetMid = null;
    let ctxTargetSenderId = null;
    let ctxTargetWrap = null;
    let ctxTargetBubble = null;

    function openMsgMenu(mid, senderId, wrap, bubble){
      ctxTargetMid = mid;
      ctxTargetSenderId = senderId;
      ctxTargetWrap = wrap;
      ctxTargetBubble = bubble;

      const isMine = (senderId === myUid);
      ctxEdit.style.display = isMine ? 'flex' : 'none';
      ctxDelete.style.display = isMine ? 'flex' : 'none';

      const rect = wrap.getBoundingClientRect();
      let top = rect.bottom + 6;
      let left = isMine ? rect.right - 200 : rect.left;
      left = Math.max(8, Math.min(left, window.innerWidth - 210));
      if (top + 180 > window.innerHeight) top = rect.top - 186;

      msgCtxMenu.style.top = top + 'px';
      msgCtxMenu.style.left = left + 'px';
      msgCtxMenu.classList.add('open');
    }

    function closeMsgMenu(){
      msgCtxMenu.classList.remove('open');
      ctxTargetMid = null;
    }

    document.addEventListener('click', (e) => {
      if (!msgCtxMenu.contains(e.target)) closeMsgMenu();
    });

    quickReactBar.addEventListener('click', async (e) => {
      const sp = e.target.closest('[data-e]');
      if (!sp || !ctxTargetMid) return;
      const emoji = sp.dataset.e;
      await toggleReaction(ctxTargetMid, emoji);
      closeMsgMenu();
    });

    ctxEdit.addEventListener('click', () => {
      if (!ctxTargetMid || !ctxTargetBubble) return;
      const obj = seen.get(ctxTargetMid);
      if (!obj) return;
      const mid = ctxTargetMid;
      const bubble = ctxTargetBubble;
      const wrap = ctxTargetWrap;
      closeMsgMenu();

      const currentText = (obj.text || '').trim();

      const editWrap = document.createElement('div');
      editWrap.className = 'editWrap';
      const inp = document.createElement('input');
      inp.className = 'editInput';
      inp.type = 'text';
      inp.value = currentText;
      const saveBtn = document.createElement('button');
      saveBtn.className = 'editSave';
      saveBtn.textContent = '저장';
      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'editCancel';
      cancelBtn.textContent = '취소';
      editWrap.appendChild(inp);
      editWrap.appendChild(saveBtn);
      editWrap.appendChild(cancelBtn);

      const row = wrap.querySelector('.row');
      if (row) row.insertAdjacentElement('afterend', editWrap);
      inp.focus();
      inp.select();

      const cleanup = () => editWrap.remove();
      cancelBtn.addEventListener('click', cleanup);

      const doSave = async () => {
        const newText = inp.value.trim();
        if (!newText || newText === currentText){ cleanup(); return; }
        try{
          const snap = await db.ref('messages/' + roomId)
            .orderByChild('messageId').equalTo(mid).once('value');
          snap.forEach(child => {
            child.ref.update({ text: newText, edited: true });
          });
          showToast('메시지가 수정되었습니다.');
        }catch(e){ showToast('수정 실패'); }
        cleanup();
      };

      saveBtn.addEventListener('click', doSave);
      inp.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') doSave();
        if (e.key === 'Escape') cleanup();
      });
    });

    ctxDelete.addEventListener('click', async () => {
      if (!ctxTargetMid) return;
      const mid = ctxTargetMid;
      closeMsgMenu();
      if (!confirm('이 메시지를 삭제할까요?')) return;
      try{
        const snap = await db.ref('messages/' + roomId)
          .orderByChild('messageId').equalTo(mid).once('value');
        snap.forEach(child => {
          child.ref.update({ deleted: true, text: '' });
        });
        showToast('메시지가 삭제되었습니다.');
      }catch(e){ showToast('삭제 실패'); }
    });

    const replyPreviewEl = document.getElementById('replyPreview');
    const replyPreviewNameEl = document.getElementById('replyPreviewName');
    const replyPreviewMsgEl = document.getElementById('replyPreviewMsg');
    const replyCloseBtn = document.getElementById('replyCloseBtn');
    const ctxReply = document.getElementById('ctxReply');

    let currentReplyTo = null;

    function setReply(mid, nick, text){
      currentReplyTo = { mid, nick, text: String(text || '').slice(0, 100) };
      replyPreviewNameEl.textContent = nick || '';
      replyPreviewMsgEl.textContent = String(text || '').slice(0, 80);
      replyPreviewEl.style.display = 'flex';
      inputEl.focus();
    }

    function clearReply(){
      currentReplyTo = null;
      replyPreviewEl.style.display = 'none';
      replyPreviewNameEl.textContent = '';
      replyPreviewMsgEl.textContent = '';
    }

    replyCloseBtn.addEventListener('click', clearReply);

    ctxReply.addEventListener('click', () => {
      if (!ctxTargetMid) return;
      const obj = seen.get(ctxTargetMid);
      if (!obj) return;
      const nick = obj.wrapEl ? (obj.wrapEl.querySelector('.meta span')?.textContent || '') : '';
      const text = obj.text || '';
      setReply(ctxTargetMid, nick, text);
      closeMsgMenu();
    });

    const toastEl = document.getElementById('toast');
    let toastTimer = null;
    function showToast(msg, ms){
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), ms || 2200);
    }

    init();
  </script>
</body>
</html>
