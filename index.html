  const doSave=async()=>{
    const t=inp.value.trim(); if(!t||t===cur){rm();return;}
    try{const s=await db.ref('messages/'+roomId).orderByChild('messageId').equalTo(mid).once('value');s.forEach(c=>c.ref.update({text:t,edited:true}));showToast('수정되었습니다.');}
    catch(e){showToast('수정 실패');}rm();
  };
  sv.addEventListener('click',doSave);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')doSave();if(e.key==='Escape')rm();});
});

ctxDelete.addEventListener('click',async()=>{
  if(!ctxMid)return;const mid=ctxMid;closeCtx();
  if(!confirm('이 메시지를 삭제할까요?'))return;
  try{const s=await db.ref('messages/'+roomId).orderByChild('messageId').equalTo(mid).once('value');s.forEach(c=>c.ref.update({deleted:true,text:''}));showToast('삭제되었습니다.');}
  catch(e){showToast('삭제 실패');}
});

// ================================================================
// REPLY
// ================================================================
function setReply(mid,nick,text,imageUrl){
  currentReplyTo={mid,nick,text:String(text||'').slice(0,100),imageUrl:imageUrl||null};
  replyPreviewNameEl.textContent=nick||'';
  replyPreviewMsgEl.textContent=text?String(text).slice(0,80):(imageUrl?'📷 사진':'');
  replyPreviewEl.style.display='flex';inputEl.focus();
}
function clearReply(){currentReplyTo=null;replyPreviewEl.style.display='none';replyPreviewNameEl.textContent='';replyPreviewMsgEl.textContent='';}
replyCloseBtn.addEventListener('click',clearReply);
ctxReply.addEventListener('click',()=>{
  if(!ctxMid)return;const obj=seen.get(ctxMid);if(!obj)return;
  const nick=obj.wrapEl?(obj.wrapEl.querySelector('.meta span')?.textContent||''):'';
  setReply(ctxMid,nick,obj.text||'',obj.imageUrl||null);closeCtx();
});

// ================================================================
// TOAST
// ================================================================
let _toastT=null;
function showToast(msg,ms=2200){toastEl.textContent=msg;toastEl.classList.add('show');if(_toastT)clearTimeout(_toastT);_toastT=setTimeout(()=>toastEl.classList.remove('show'),ms);}

// ================================================================
// EMOJI PANEL
// ================================================================
const EMOJIS=['😀','😄','😊','😍','😘','😎','🥹','😂','😭','😡','👍','👏','🙏','🔥','🎉','💯','❤️','✨','⭐','✅','❌','⚡','🍀','☕','🍜','🎮','📌','📝'];
(function buildEmoji(){
  EMOJIS.forEach(e=>{
    const d=document.createElement('div');d.className='emoji clickable';d.textContent=e;
    let touched=false;
    const ins=()=>{inputEl.value=(inputEl.value||'')+e;onInput();try{inputEl.focus({preventScroll:true});const n=(inputEl.value||'').length;inputEl.setSelectionRange(n,n);}catch(_){try{inputEl.focus();}catch(__){}}markTypeActivity();};
    d.addEventListener('touchstart',ev=>{ev.preventDefault();touched=false;},{passive:false});
    d.addEventListener('touchend',ev=>{ev.preventDefault();touched=true;ins();},{passive:false});
    d.addEventListener('mousedown',ev=>ev.preventDefault());
    d.addEventListener('click',ev=>{ev.preventDefault();if(touched){touched=false;return;}ins();});
    emojiGrid.appendChild(d);
  });
})();

let _emjTouched=false;
const toggleEmoji=()=>{emojiPanel.classList.toggle('open');const o=emojiPanel.classList.contains('open');emojiPanel.setAttribute('aria-hidden',o?'false':'true');try{inputEl.focus({preventScroll:true});}catch(_){try{inputEl.focus();}catch(__){}}};
emojiBtn.addEventListener('touchstart',e=>{e.preventDefault();_emjTouched=false;},{passive:false});
emojiBtn.addEventListener('touchend',e=>{e.preventDefault();_emjTouched=true;toggleEmoji();},{passive:false});
emojiBtn.addEventListener('mousedown',e=>e.preventDefault());
emojiBtn.addEventListener('click',e=>{e.preventDefault();if(_emjTouched){_emjTouched=false;return;}toggleEmoji();});
document.addEventListener('click',e=>{if(!emojiBtn.contains(e.target)&&!emojiPanel.contains(e.target)){emojiPanel.classList.remove('open');emojiPanel.setAttribute('aria-hidden','true');}});

// ================================================================
// PHOTO UPLOAD
// ================================================================
const imgInputEl = document.getElementById('imgInput');
imgInputEl.addEventListener('change',()=>{if(imgInputEl.files[0]){sendImage(imgInputEl.files[0]);imgInputEl.value='';}});
document.addEventListener('paste',e=>{
  if(!roomId)return;
  const items=e.clipboardData&&e.clipboardData.items; if(!items)return;
  for(const item of items){
    if(item.type.startsWith('image/')){e.preventDefault();sendImage(item.getAsFile());return;}
  }
});

// ================================================================
// VISIBILITY RESTORE (iOS GPU / 검은화면 방지)
// ================================================================
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    if (appEl) { appEl.style.display='none'; void appEl.offsetHeight; appEl.style.display='flex'; }
    refreshLayout();
    setTimeout(refreshLayout, 300);
    try { firebase.database().goOnline(); } catch(e) {}
    // ★ 포그라운드 복귀 시 최근 메시지 즉시 fetch (Firebase 재연결 지연 보완)
    if (roomId && afterSeq > 0) {
      db.ref('messages/'+roomId).orderByChild('seq').startAt(afterSeq+1).limitToLast(30).once('value').then(snap => {
        if (!snap.exists()) return;
        let added = false;
        snap.forEach(child => {
          const m = child.val(); if (!m) return;
          const mid = String(m.messageId||child.key||'');
          if (seen.has(mid)) return;
          mergeServerMsg({ messageId:mid, senderId:String(m.senderId||''), senderNick:String(m.senderNick||''),
            text:String(m.text||''), ts:Number(m.ts||0), seq:Number(m.seq||0),
            deleted:!!m.deleted, edited:!!m.edited, replyTo:m.replyTo||null, imageUrl:m.imageUrl||null });
          afterSeq = Math.max(afterSeq, Number(m.seq||0));
          added = true;
        });
        if (added) scrollToBottom(false);
      }).catch(()=>{});
    }
  }
});

// ================================================================
// iOS PWA 푸시 탭 복원 처리
// ================================================================

// BFCache 복원
window.addEventListener('pageshow', async (e) => {
  if (!e.persisted) return;

  try { firebase.database().goOnline(); } catch(err) {}
  refreshLayout();

  if (!myUid) {
    const user = firebase.auth().currentUser;
    if (user && user.uid) myUid = user.uid;
    else { showLogin(); return; }
  }

  if (!myNick) { showHome(); return; }

  const urlRid = getRoomUrlId();
  if (urlRid) {
    if (urlRid !== roomId) {
      await enterRoom(urlRid);
    } else {
      // 같은 방 재진입 → 구독 재시작으로 누락 메시지 보장
      subscribeMessages(roomId);
    }
  } else if (roomId) {
    showHome();
  }
});

// popstate (뒤로가기 / 히스토리 변경)
window.addEventListener('popstate', async () => {
  const urlRid = getRoomUrlId();
  if (urlRid && myUid && myNick && urlRid !== roomId) {
    await enterRoom(urlRid);
  } else if (!urlRid && roomId) {
    showHome();
  }
});

// focus: iOS PWA에서 푸시 탭 후 URL 변경 감지
let _lastFocusHref = '';
window.addEventListener('focus', async () => {
  try { firebase.database().goOnline(); } catch(e) {}
  const href = location.href;
  if (href === _lastFocusHref) return;
  _lastFocusHref = href;
  const urlRid = getRoomUrlId();
  if (urlRid && myUid && myNick && urlRid !== roomId) {
    await enterRoom(urlRid);
  }
});

// ================================================================
// SPLASH
// ================================================================
function hideSplash() {
  const sp = document.getElementById('splashScreen');
  if (sp) { sp.style.opacity='0'; sp.style.transition='opacity .2s'; setTimeout(()=>sp.remove(),250); }
}

// ================================================================
// INIT
// ================================================================
async function init() {
  myNick = (localStorage.getItem(LS_NICK) || '').trim();

  applyBubbleTheme();

  // 기존 Firebase 세션 확인 (자동 로그인)
  const authOk = await waitForAuth();

  if (!authOk || !myUid) {
    // 세션 없음 → 로그인 화면
    showLogin();
    return;
  }

  // 세션 있음 → 정상 진입
  schedulePushSync();
  updateMenuStates();
  setAppBadge(0);
  _lastFocusHref = location.href;

  const urlRid = getRoomUrlId();
  if (urlRid && myNick) {
    await enterRoom(urlRid);
  } else if (myNick && myUid) {
    // PWA 복귀 시 마지막 방으로 바로 입장 (대기실 깜빡임 방지)
    try {
      const snap = await db.ref('userSettings/'+myUid+'/lastRoom').once('value');
      const d = snap.val();
      if (d && d.roomId) {
        await enterRoom(d.roomId);
        return;
      }
    } catch(e) {}
    showHome();
  } else {
    showHome();
  }
}

firebase.auth().onAuthStateChanged(user => {
  if (user && user.uid && !myUid) {
    myUid = user.uid;
    schedulePushSync();
  } else if (!user && myUid) {
    // 세션 만료 → 로그인 화면으로
    myUid = '';
    if (loginScreen.style.display === 'none' || !loginScreen.style.display) showLogin();
  }
});

initShareTarget();
init();
</script>
