<!doctype html>
<html lang="ko">
<head>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192x192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Chat">
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,viewport-fit=cover,shrink-to-fit=no"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cute+Font&family=Gaegu&family=Hi+Melody&family=Nanum+Pen+Script&family=Single+Day&display=swap" rel="stylesheet">
<title>Chat</title>
<style>
:root{
  --bg:#f3f4f6;--card:#fff;--text:#111827;--muted:#6b7280;--line:#e5e7eb;
  --me:#374151;--meText:#ffffff;--other:#ffffff;--otherText:#111827;
  --accent:#22c55e;--danger:#ef4444;
  --safeB:env(safe-area-inset-bottom,0px);--safeBComp:var(--safeB);
  --safeT:env(safe-area-inset-top,0px);--kb:0px;--kbFix:40px;
  --appH:100dvh;--composerH:64px;--typingH:34px;
  --shadow:0 10px 30px rgba(0,0,0,.06);--shadow2:0 14px 40px rgba(0,0,0,.12);
  --bubbleFontSize:16px;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif;overflow:hidden}
button,.clickable{-webkit-tap-highlight-color:transparent;touch-action:manipulation;cursor:pointer;transition:transform .08s,box-shadow .18s,filter .18s,background .18s,border-color .18s}
button:active,.clickable:active{transform:translateY(1px) scale(.99)}
button:focus-visible{outline:3px solid rgba(34,197,94,.35);outline-offset:2px}
.app{height:100vh;height:100dvh;display:flex;flex-direction:column;min-height:0;overflow:hidden;padding-top:var(--safeT);background:var(--bg)}
header{position:sticky;top:0;z-index:10;padding:12px 14px 10px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.97)}
.headTop{display:flex;align-items:center;justify-content:space-between;gap:10px}
.title{font-size:16px;font-weight:800;margin:0;line-height:1.2}
.sub{margin-top:6px;font-size:12px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap}
.pill,.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#fff;font-size:12px;color:var(--muted)}
.menuWrap{position:relative;display:flex;align-items:center;gap:8px}
.menuBtn{width:40px;height:40px;border-radius:12px;border:1px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;line-height:1;user-select:none;box-shadow:0 6px 18px rgba(0,0,0,.06)}
.menu{position:absolute;right:0;top:46px;min-width:280px;max-height:70vh;overflow-y:auto;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow2);display:none;-webkit-overflow-scrolling:touch}
.menu.open{display:block}
.menuSection{padding:0}
.menuSectionTitle{font-size:11px;font-weight:800;color:var(--muted);padding:10px 12px 4px;text-transform:uppercase;letter-spacing:.5px;background:#f8fafc;border-top:1px solid var(--line)}
.menuSection:first-child .menuSectionTitle{border-top:none;border-radius:14px 14px 0 0}
.menu button{width:100%;padding:11px 12px;border:0;background:#fff;text-align:left;font-size:14px;display:flex;justify-content:space-between;align-items:center}
.menu button:hover{background:#f8fafc}
.menu .hint{font-size:12px;color:var(--muted);padding:10px 12px;border-top:1px solid var(--line);line-height:1.35;white-space:pre-wrap}
.mFontSizeRow{width:100%;padding:9px 12px;border:0;background:#fff;display:flex;justify-content:space-between;align-items:center;font-size:14px}
.menuColorRow{display:flex;align-items:center;gap:8px;padding:9px 12px;font-size:14px}
.menuColorRow span{flex:1}
.menuBgActions{display:flex;gap:6px;align-items:center}
.fontSizeCtrl{display:flex;align-items:center;gap:8px}
.fontSizeCtrl button{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:#f8fafc;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0;cursor:pointer;font-weight:700;color:var(--text)}
.fontSizeCtrl button:hover{background:#e5e7eb}
.fontSizeCtrl span{min-width:36px;text-align:center;font-size:14px;font-weight:700;color:var(--text)}
.home{flex:1;min-height:0;overflow:auto;padding:16px;-webkit-overflow-scrolling:touch}
.homeCard{width:100%;max-width:720px;margin:0 auto;background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:var(--shadow)}
.homeTitle{font-weight:900;font-size:18px;margin:0 0 10px}
.homeTitleRow{display:flex;align-items:center;justify-content:space-between;margin:0 0 10px}
.homeTitleRow .homeTitle{margin:0}
.homeMenuWrap{position:relative;flex-shrink:0}
.homeMenuBtn{width:34px;height:34px;border:0;background:transparent;cursor:pointer;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:background .15s;padding:0}
.homeMenuBtn:hover{background:var(--hover)}
.homeMenuBtn svg{display:block}
.homeDropdown{position:absolute;top:calc(100% + 6px);right:0;background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow2);min-width:220px;z-index:200;overflow:hidden;display:none}
.homeDropdown.open{display:block}
.homeDropdownAccount{padding:14px 16px 12px;border-bottom:1px solid var(--line)}
.homeDropdownAccountLabel{font-size:11px;color:var(--muted);margin-bottom:3px}
.homeDropdownAccountName{font-size:15px;font-weight:900;color:var(--text)}
.homeDropdownLogout{width:100%;border:0;background:transparent;text-align:left;padding:12px 16px;font-size:14px;font-weight:700;color:var(--danger);cursor:pointer;display:flex;align-items:center;gap:8px}
.homeDropdownLogout:hover{background:#fff1f2}
.homeDropdownNick{padding:10px 16px 8px;border-bottom:1px solid var(--line)}
.homeDropdownNickBtn{width:100%;border:0;background:transparent;text-align:left;padding:12px 16px;font-size:14px;font-weight:700;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line)}
.homeDropdownNickBtn:hover{background:#f8fafc}
.sectionTitle{font-size:12px;color:var(--muted);font-weight:800;margin:14px 0 8px}
.field{display:flex;flex-direction:column;gap:8px;margin:10px 0}
.field label{font-size:12px;color:var(--muted)}
.field input{height:46px;border-radius:14px;border:1px solid var(--line);padding:0 12px;font-size:16px;outline:none;transition:box-shadow .18s,border-color .18s}
.field input:focus{border-color:rgba(34,197,94,.6);box-shadow:0 0 0 4px rgba(34,197,94,.12)}
.rowBtns{display:flex;gap:10px;margin-top:10px}
.primaryBtn{flex:1;height:46px;border-radius:14px;border:0;background:#111827;color:#fff;font-size:15px;font-weight:900;box-shadow:0 10px 18px rgba(17,24,39,.14)}
.ghostBtn{flex:1;height:46px;border-radius:14px;border:1px solid var(--line);background:#fff;color:#111827;font-size:15px;font-weight:800}
.ghostBtn:hover{background:#f8fafc}
.roomList{display:flex;flex-direction:column;gap:10px}
.roomItem{border:1px solid var(--line);border-radius:16px;padding:12px;background:#fff;box-shadow:0 6px 18px rgba(0,0,0,.04);display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer}
.roomItem:hover{background:#f8fafc}
.roomLeft{display:flex;flex-direction:column;gap:6px;min-width:0}
.roomName{font-weight:900;font-size:15px;display:flex;align-items:center;gap:8px;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.roomMeta{font-size:12px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap}
.roomRight{display:flex;align-items:center;gap:8px;flex-shrink:0}
.log{flex:1;min-height:0;overflow:auto;padding:12px 12px calc(var(--composerH) + var(--typingH) + var(--kb) + 12px);-webkit-overflow-scrolling:touch;background-color:var(--chatBg,transparent);background-size:cover;background-position:center;background-repeat:no-repeat}
.msg{display:flex;flex-direction:column;gap:4px;margin:10px 0;width:100%}
.row{display:flex;gap:8px;width:100%}
.row.me{justify-content:flex-end}
.row.other{justify-content:flex-start}
.bubble{max-width:82%;padding:12px;border-radius:16px;border:1px solid var(--line);background:var(--other);color:var(--otherText);white-space:pre-wrap;word-break:break-word;font-size:var(--bubbleFontSize,16px);line-height:1.35;font-family:var(--chatFontFamily,inherit)}
.row.me .bubble{background:var(--me);color:var(--meText);border-color:transparent;border-bottom-right-radius:6px;box-shadow:none}
.row.other .bubble{border-bottom-left-radius:6px}
.meta{font-size:11px;color:var(--muted);display:flex;gap:8px;align-items:center}
.meta.me{justify-content:flex-end}
.badgePending{opacity:.78}
.badgeFail{color:var(--danger);font-weight:900;cursor:pointer}
.readBadge{font-weight:900;opacity:.85}
.typingBar{position:fixed;left:0;right:0;bottom:var(--composerH);height:var(--typingH);display:none;align-items:center;padding:0 12px;font-size:12px;color:var(--muted);background:rgba(255,255,255,.98);border-top:1px solid var(--line);z-index:19}
.composer{position:fixed;left:0;right:0;bottom:0;min-height:var(--composerH);padding:10px 12px;border-top:1px solid var(--line);background:rgba(255,255,255,.97);display:flex;gap:10px;align-items:flex-end;z-index:20;cursor:text}
.composer::before{display:none}
.emojiBtn{width:48px;height:48px;border-radius:14px;border:1px solid var(--line);background:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;user-select:none;box-shadow:0 6px 18px rgba(0,0,0,.06)}
.inputWrap{flex:1;min-height:48px;border-radius:14px;border:1px solid var(--line);background:#fff;display:flex;align-items:flex-start;padding:12px 12px;contain:layout style;isolation:isolate}
#input{width:100%;border:0;outline:none;font-size:16px;background:transparent;resize:none;font-family:inherit;line-height:24px;height:24px;max-height:40vh;overflow-y:hidden;padding:0;margin:0;display:block;box-sizing:border-box;-webkit-font-smoothing:antialiased;scrollbar-width:none;-ms-overflow-style:none}
#input::-webkit-scrollbar{display:none}
.sendBtn{width:64px;height:48px;border-radius:14px;border:0;background:#111827;color:#fff;font-size:15px;font-weight:900;box-shadow:0 10px 18px rgba(17,24,39,.14);transition:opacity .15s}
.sendBtn:disabled{opacity:.45;box-shadow:none}
.emojiPanel{position:fixed;left:12px;right:12px;bottom:calc(var(--composerH) + 10px);background:#fff;border:1px solid var(--line);border-radius:16px;padding:10px;box-shadow:var(--shadow);display:none;z-index:30}
.emojiPanel.open{display:block}
.emojiGrid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px}
.emoji{height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;user-select:none;border:1px solid transparent}
.emoji:hover{background:#f8fafc}
@media(max-width:420px){.bubble{max-width:88%}.emojiGrid{grid-template-columns:repeat(7,1fr)}}
.modalOverlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;padding:16px;z-index:50}
.modalOverlay.open{display:flex}
.modalCard{width:100%;max-width:420px;background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow2);padding:14px}
.modalTitle{font-size:16px;font-weight:900;margin:4px 0 8px}
.modalBody{font-size:13px;color:var(--muted);line-height:1.45;margin-bottom:10px;white-space:pre-wrap}
.modalCard input{width:100%;height:46px;border-radius:14px;border:1px solid var(--line);padding:0 12px;font-size:16px;outline:none;transition:box-shadow .18s,border-color .18s}
.modalCard input:focus{border-color:rgba(34,197,94,.6);box-shadow:0 0 0 4px rgba(34,197,94,.12)}
.modalBtnsRow{display:flex;gap:10px;margin-top:10px}
.modalBtnsRow .primaryBtn,.modalBtnsRow .ghostBtn{flex:1}
.msgCtxMenu{position:fixed;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 14px 40px rgba(0,0,0,.14);overflow:hidden;z-index:200;min-width:160px;display:none}
.msgCtxMenu.open{display:block}
.msgCtxMenu button{width:100%;padding:11px 14px;border:0;background:#fff;text-align:left;font-size:14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.msgCtxMenu button:hover{background:#f8fafc}
.msgCtxMenu button.danger{color:var(--danger)}
.quickReact{display:flex;gap:4px;padding:8px 10px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.quickReact span{font-size:20px;cursor:pointer;padding:2px 4px;border-radius:8px;line-height:1.2;transition:transform .1s}
.quickReact span:hover{transform:scale(1.3)}
.editWrap{display:flex;gap:6px;align-items:center;margin-top:6px;flex-wrap:wrap}
.editInput{flex:1;min-width:0;border:1px solid rgba(34,197,94,.5);border-radius:10px;padding:6px 10px;font-size:14px;outline:none;box-shadow:0 0 0 3px rgba(34,197,94,.1)}
.editSave,.editCancel{padding:5px 12px;border-radius:8px;border:0;font-size:13px;font-weight:700;cursor:pointer}
.editSave{background:#111827;color:#fff}
.editCancel{background:#f3f4f6;color:#374151}
.deletedBubble{font-style:italic;color:var(--muted);font-size:13px}
.editedMark{font-size:10px;color:var(--muted);margin-left:4px}
.reactionsBar{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.reactChip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:999px;border:1px solid var(--line);background:#fff;font-size:13px;cursor:pointer;transition:background .15s,border-color .15s;user-select:none}
.reactChip:hover{background:#f0fdf4;border-color:var(--accent)}
.reactChip.mine{background:#f0fdf4;border-color:var(--accent)}
.reactCount{font-size:11px;color:var(--muted);font-weight:700}
.msgLink{color:inherit;text-decoration:underline;text-underline-offset:2px;word-break:break-all;-webkit-tap-highlight-color:rgba(34,197,94,.18)}
.row.me .bubble .msgLink{color:#d1fae5}
.shareIncomingBanner{background:#f0fdf4;border:1px solid rgba(34,197,94,.3);border-radius:14px;padding:12px 14px;margin-bottom:12px;display:none}
.shareIncomingBanner.active{display:block}
.shareIncomingTop{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.shareIncomingIcon{font-size:18px;flex-shrink:0}
.shareIncomingLabel{font-size:13px;font-weight:800;color:#166534;flex:1}
.shareIncomingText{font-size:12px;color:var(--muted);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.shareIncomingHint{font-size:11px;color:#16a34a}
.linkPreview{margin-top:8px;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#f8fafc;cursor:pointer;text-decoration:none;color:inherit;display:block;max-width:360px}
.linkPreview:hover{background:#f0f4f8}
.lpImg{width:100%;max-height:180px;object-fit:cover;display:block}
.lpBody{padding:10px 12px}
.lpSite{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.lpTitle{font-size:13px;font-weight:700;line-height:1.3;word-break:break-word;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.lpDesc{font-size:11px;color:var(--muted);margin-top:3px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.ytEmbed{margin-top:8px;border-radius:12px;overflow:hidden;max-width:360px;border:1px solid var(--line)}
.ytEmbed iframe{width:100%;aspect-ratio:16/9;display:block;border:0;border-radius:12px}
.igPreview{margin-top:8px;border:1px solid var(--line);border-radius:12px;overflow:hidden;max-width:360px;background:#fff;cursor:pointer;text-decoration:none;color:inherit;display:block}
.igPreview:hover{background:#fafafa}
.igThumbWrap{position:relative;width:100%;background:#000}
.igThumbWrap img{width:100%;max-height:360px;object-fit:cover;display:block}
.igPlayBtn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:56px;height:56px;background:rgba(0,0,0,.55);border-radius:50%;display:flex;align-items:center;justify-content:center}
.igPlayBtn::after{content:'';display:block;width:0;height:0;border-style:solid;border-width:10px 0 10px 18px;border-color:transparent transparent transparent #fff;margin-left:3px}
.igBody{padding:10px 12px;display:flex;align-items:center;gap:8px}
.igLogo{width:20px;height:20px;flex-shrink:0}
.igInfo{min-width:0}
.igSite{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.igTitle{font-size:13px;font-weight:700;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;word-break:break-word}
.replyPreview{position:absolute;bottom:calc(100% + 2px);left:0;right:0;background:rgba(255,255,255,.99);border-top:1px solid var(--line);padding:8px 12px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);z-index:21}
.replyPreviewBar{width:3px;height:100%;min-height:28px;background:var(--accent);border-radius:2px;flex-shrink:0}
.replyPreviewText{flex:1;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.replyPreviewName{font-weight:700;color:var(--accent);margin-bottom:2px}
.replyCloseBtn{border:0;background:none;font-size:18px;cursor:pointer;color:var(--muted);flex-shrink:0;padding:0 4px;line-height:1}
.replyQuote{border-left:3px solid var(--accent);padding:5px 10px;border-radius:0 8px 8px 0;background:rgba(34,197,94,.07);margin-bottom:6px;font-size:12px;color:var(--muted);cursor:pointer;max-width:100%;overflow:hidden}
.replyQuote:hover{background:rgba(34,197,94,.12)}
.replyQuoteName{font-weight:700;color:var(--accent);margin-bottom:2px}
.replyQuoteText{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.replyQuoteRow{display:flex;align-items:center;gap:6px}
.replyQuoteImg{width:32px;height:32px;object-fit:cover;border-radius:4px;flex-shrink:0}
.searchBtn{width:40px;height:40px;border-radius:12px;border:1px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1;user-select:none;box-shadow:0 6px 18px rgba(0,0,0,.06)}
.searchBar{display:flex;align-items:center;gap:6px;padding:8px 0 0;margin-top:8px;border-top:1px solid var(--line)}
.searchBar input{flex:1;height:36px;border-radius:10px;border:1px solid var(--line);padding:0 10px;font-size:14px;outline:none;min-width:0;transition:border-color .15s}
.searchBar input:focus{border-color:rgba(34,197,94,.6);box-shadow:0 0 0 3px rgba(34,197,94,.1)}
.searchInfo{font-size:12px;color:var(--muted);white-space:nowrap;min-width:50px;text-align:center;font-weight:700}
.searchArrow{width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;flex-shrink:0;color:var(--text)}
.searchArrow:hover{background:#f0f0f0}
.searchArrow:disabled{opacity:.35;cursor:default}
.searchClose{width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;flex-shrink:0;color:var(--muted)}
.searchClose:hover{background:#fff1f2;color:var(--danger)}
.searchHighlight{background:rgba(255,213,0,.4);border-radius:2px;padding:0 1px}
.searchHighlightCurrent{background:rgba(255,140,0,.6);border-radius:2px;padding:0 1px}
/* stealth (시크릿) mode */
body.stealth{background:#fff}
body.stealth header{padding:4px 10px 0;background:#fff;border-bottom:none;backdrop-filter:none}
body.stealth .title{font-size:13px;font-weight:600;color:#5f6368}
body.stealth .sub{display:none}
body.stealth .menuWrap{gap:4px}
body.stealth .menuBtn,body.stealth .searchBtn{width:28px;height:28px;border-radius:4px;font-size:14px;border:none;box-shadow:none;background:transparent;color:#5f6368}
body.stealth .menuBtn:hover,body.stealth .searchBtn:hover{background:#f1f3f4}
body.stealth .log{padding:8px 8px 8px}
body.stealth .msg{margin:3px 0}
body.stealth .bubble{padding:6px 10px;border-radius:6px;font-size:var(--bubbleFontSize,13px);box-shadow:none;border:1px solid #e0e0e0}
body.stealth .bubble.me{background:#e8f0fe;border-color:#d2e3fc}
body.stealth .meta{font-size:10px;margin-top:1px}
body.stealth .typingBar{position:relative;left:auto;right:auto;bottom:auto}
body.stealth .composer{position:relative;left:auto;right:auto;bottom:auto;height:auto;min-height:36px;padding:4px 0;background:#fff;border-top:1px solid #dadce0;backdrop-filter:none;gap:0;flex-shrink:0}
body.stealth .inputWrap{min-height:28px;height:auto;border-radius:0;border:none;padding:0 8px;background:#fff;box-shadow:none;flex:1}
body.stealth .composer #input{font-size:13px;line-height:20px;max-height:60px}
body.stealth .sendBtn{width:36px;height:28px;border-radius:0;font-size:0;padding:0;display:flex;align-items:center;justify-content:center;background:#5f6368;box-shadow:none;flex-shrink:0}
body.stealth .sendBtn::after{content:'▶';font-size:11px}
body.stealth .photoBtn{display:none}
body.stealth .emojiBtn{display:none}
body.stealth .stealthBar{display:flex !important}
.stealthBar{display:none;align-items:center;justify-content:space-between;padding:4px 10px;background:#f0f1f3;border-bottom:1px solid #dadce0;font-size:11px;color:#5f6368;flex-shrink:0;z-index:25}
.stealthBar button{border:none;background:transparent;font-size:11px;color:#1a73e8;cursor:pointer;padding:2px 6px;border-radius:3px}
.stealthBar button:hover{background:#e8f0fe}
.stealthFontCtrl{display:flex;align-items:center;gap:4px}
.stealthFontCtrl button{font-size:11px;font-weight:700;min-width:22px}
.stealthFontCtrl span{font-size:11px;min-width:16px;text-align:center}
.loadMoreWrap{display:flex;justify-content:center;padding:12px 0 4px}
.loadMoreBtn{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:8px 20px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:background .15s}
.loadMoreBtn:hover{background:#f0f0f0}
.loadMoreBtn:disabled{opacity:.5;cursor:default}
@media(hover:hover)and(pointer:fine){.mobileOnly{display:none!important}}
.toast{position:fixed;bottom:calc(var(--composerH) + 12px);left:50%;transform:translateX(-50%) translateY(20px);background:#111827;color:#fff;padding:9px 18px;border-radius:999px;font-size:13px;font-weight:700;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:400;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.photoBtn{width:48px;height:48px;border-radius:14px;border:1px solid var(--line);background:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;user-select:none;box-shadow:0 6px 18px rgba(0,0,0,.06);cursor:pointer;flex-shrink:0}
.imgMsg{display:block;max-width:240px;border-radius:12px;overflow:hidden;cursor:pointer;margin:2px 0;border:1px solid var(--line)}
.imgMsg img{width:100%;display:block;border-radius:12px;max-height:320px;object-fit:cover}
.imgUploading{width:180px;height:110px;border-radius:12px;background:#f3f4f6;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;font-size:13px;color:var(--muted);border:1px solid var(--line)}
.imgUploadSpinner{width:22px;height:22px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loginScreen{flex:1;min-height:0;overflow:auto;padding:24px 16px 40px;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg)}
.loginCard{width:100%;max-width:400px;background:#fff;border:1px solid var(--line);border-radius:28px;padding:32px 24px 28px;box-shadow:var(--shadow2);text-align:center}
.loginLogo{width:148px;height:148px;object-fit:contain;margin:0 auto 16px;display:block;border-radius:24px}
.loginTitle{font-size:24px;font-weight:900;margin:0 0 4px;color:var(--text)}
.loginSub{font-size:13px;color:var(--muted);margin:0 0 22px;line-height:1.5}
.loginError{color:var(--danger);font-size:13px;min-height:16px;margin:4px 0 0;text-align:left;padding:0 2px}
.loginHint{font-size:11px;color:var(--muted);margin-top:14px;line-height:1.6}
.lastRoomBar{background:#f0fdf4;border:1px solid rgba(34,197,94,.25);border-radius:14px;padding:12px 14px;margin-top:12px;display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer}
.lastRoomBar:hover{background:#dcfce7}
.lastRoomInfo{display:flex;flex-direction:column;gap:2px;min-width:0}
.lastRoomName{font-weight:800;font-size:14px;color:#166534;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lastRoomLabel{font-size:11px;color:var(--muted)}
.lastRoomBtn{flex-shrink:0;padding:6px 14px;background:#22c55e;color:#fff;border:0;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer}

// 계정명을 Firebase Email 형식으로 변환 (한글/특수문자 지원)
function usernameToEmail(username) {
  try {
    const bytes = new TextEncoder().encode(username.toLowerCase().trim());
    let binary = '';
    bytes.forEach(b => binary += String.fromCharCode(b));
    const b64 = btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
    return b64.slice(0, 50) + '@chatapp.local';
  } catch(e) {
    return username.toLowerCase().replace(/[^a-z0-9]/g, '') + '@chatapp.local';
  }
}

// 로그인 시도 → 없으면 자동 회원가입
async function loginOrRegister(username, password) {
  const email = usernameToEmail(username);
  // 1차: 로그인 시도
  try {
    const cred = await firebase.auth().signInWithEmailAndPassword(email, password);
    return { ok: true, uid: cred.user.uid };
  } catch(signInErr) {
    const code = signInErr.code || '';
    // 계정 없음 → 회원가입
    if (code === 'auth/user-not-found' || code === 'auth/invalid-credential' || code === 'auth/invalid-email') {
      try {
        const cred = await firebase.auth().createUserWithEmailAndPassword(email, password);
        return { ok: true, uid: cred.user.uid };
      } catch(createErr) {
        const cc = createErr.code || '';
        if (cc === 'auth/weak-password') return { ok: false, error: '비밀번호는 6자 이상이어야 합니다.' };
        if (cc === 'auth/email-already-in-use') return { ok: false, error: '비밀번호가 올바르지 않습니다.' };
        return { ok: false, error: '가입 실패: ' + (createErr.message || cc) };
      }
    }
    if (code === 'auth/wrong-password' || code === 'auth/invalid-login-credentials') {
      return { ok: false, error: '비밀번호가 올바르지 않습니다.' };
    }
    if (code === 'auth/too-many-requests') {
      return { ok: false, error: '잠시 후 다시 시도해 주세요.' };
    }
    return { ok: false, error: signInErr.message || '로그인 실패' };
  }
}

// 현재 Firebase 세션 확인 (앱 시작 시)
function waitForAuth() {
  return new Promise((resolve) => {
    const unsub = firebase.auth().onAuthStateChanged(user => {
      unsub();
      if (user && user.uid) {
        myUid = user.uid;
        resolve(true);
      } else {
        resolve(false);
      }
    });
    setTimeout(() => resolve(false), 8000);
  });
}

function _rAuthKey(rid) { return LS_ROOM_AUTH + rid; }
function getRoomAuth(rid) { try { return JSON.parse(localStorage.getItem(_rAuthKey(rid)) || ''); } catch(e) { return null; } }
function setRoomAuth(rid, o) { try { localStorage.setItem(_rAuthKey(rid), JSON.stringify(o)); } catch(e) {} }
function clearRoomAuth(rid) { try { localStorage.removeItem(_rAuthKey(rid)); } catch(e) {} }
function randHex(n) {
  const u = new Uint8Array(n);
  try { crypto.getRandomValues(u); } catch(e) { u.forEach((_,i)=>u[i]=Math.floor(Math.random()*256)); }
  return Array.from(u).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function sha256(s) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function hashPass(pass, salt) { return sha256('roompass|' + pass + '|' + salt); }

async function ensureRoomAccess(info) {
  if (!info || !info.passEnabled) return true;
  const rid = info.roomId, ver = info.passVer, hash = info.passHash, salt = info.passSalt;
  if (!hash) return true;
  const saved = getRoomAuth(rid);
  if (saved && saved.ver === ver && saved.hash === hash) return true;
  for (let i = 0; i < 3; i++) {
    const res = await openPassModal({title:'비밀번호 입력', body:'이 방은 비밀번호가 필요합니다.', okText:'입장'});
    if (!res) return false;
    const pw = (res.value || '').trim();
    if (!pw) { alert('비밀번호를 입력해 주세요.'); continue; }
    if (await hashPass(pw, salt) === hash) { setRoomAuth(rid, {ver, hash, at: Date.now()}); return true; }
    alert('비밀번호가 올바르지 않습니다.');
  }
  return false;
}
async function setRoomPassword(rid, pass) {
  const salt = randHex(16);
  const hash = await hashPass(pass, salt);
  const tx = await db.ref('rooms/'+rid+'/passVer').transaction(v => (Number(v||0)+1));
  const ver = Number((tx && tx.snapshot && tx.snapshot.val()) || 1);
  await db.ref('rooms/'+rid).update({passEnabled:true, passSalt:salt, passHash:hash, passVer:ver, updatedAt:SV.TIMESTAMP});
  setRoomAuth(rid, {ver, hash, at:Date.now()});
}
async function removeRoomPassword(rid) {
  const tx = await db.ref('rooms/'+rid+'/passVer').transaction(v => (Number(v||0)+1));
  const ver = Number((tx && tx.snapshot && tx.snapshot.val()) || 1);
  await db.ref('rooms/'+rid).update({passEnabled:false, passSalt:null, passHash:null, passVer:ver, updatedAt:SV.TIMESTAMP});
  clearRoomAuth(rid);
}

let _actx = null, _audioReady = false;
const BEEP = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQAAAAA=";
async function unlockAudio() {
  try { if (!_actx) _actx = new (window.AudioContext||window.webkitAudioContext)(); if (_actx.state!=='running') await _actx.resume(); _audioReady=true; } catch(e) { _audioReady=false; }
  try { const a=new Audio(BEEP); a.playsInline=true; await a.play(); a.pause(); } catch(e) {}
}
function playBeep() {
  if (!soundEnabled) return;
  if (_actx && _audioReady) {
    try {
      const o=_actx.createOscillator(), g=_actx.createGain();
      o.type='sine'; o.frequency.value=880; g.gain.value=0.0001;
      o.connect(g); g.connect(_actx.destination);
      const t=_actx.currentTime;
      g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.15,t+.01); g.gain.exponentialRampToValueAtTime(0.0001,t+.18);
      o.start(t); o.stop(t+.2); return;
    } catch(e) {}
  }
  try { const a=new Audio(BEEP); a.playsInline=true; a.play().catch(()=>{}); } catch(e) {}
}

  const r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
  return 0.299*r+0.587*g+0.114*b;
}

// ================================================================
function extractUrl(t) { try { const m=String(t||'').match(/https?:\/\/[^\s]+/); return m?m[0]:null; } catch(e){return null;} }
function extractYouTubeId(url) {
  try {
    const u = new URL(url);
    if (u.hostname.match(/^(www\.)?(youtube\.com|youtu\.be|m\.youtube\.com)$/)) {
      if (u.hostname.includes('youtu.be')) return u.pathname.slice(1).split(/[?#]/)[0];
      if (u.pathname.startsWith('/watch')) return u.searchParams.get('v');
      const m = u.pathname.match(/^\/(shorts|embed|v)\/([^/?#]+)/);
      if (m) return m[2];
    }
  } catch(e) {}
  return null;
}
function linkifyText(text) {
  const frag=document.createDocumentFragment();
  const re=/(https?:\/\/[^\s]+)/g;
  let last=0, m;
  while((m=re.exec(text))!==null){
    if(m.index>last) frag.appendChild(document.createTextNode(text.slice(last,m.index)));
    const a=document.createElement('a');
    a.href=m[0]; a.target='_blank'; a.rel='noopener noreferrer'; a.className='msgLink'; a.textContent=m[0];
    a.addEventListener('click',e=>e.stopPropagation());
    frag.appendChild(a); last=m.index+m[0].length;
  }
  if(last<text.length) frag.appendChild(document.createTextNode(text.slice(last)));
  return frag;
}
function isInstagramUrl(url) {
  try { return new URL(url).hostname.match(/^(www\.)?instagram\.com$/); } catch(e) { return false; }
}
function renderLinkPreview(url, container) {
  const ytId = extractYouTubeId(url);
  if (ytId) { renderYouTubeEmbed(ytId, url, container); return; }
  if (isInstagramUrl(url)) { renderInstagramPreview(url, container); return; }
  renderOgPreview(url, container);
}
function renderYouTubeEmbed(ytId, url, container) {
  const wrap = document.createElement('div'); wrap.className='ytEmbed';
  const iframe = document.createElement('iframe');
  iframe.src = 'https://www.youtube.com/embed/'+encodeURIComponent(ytId);
  iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
  iframe.allowFullscreen = true;
  iframe.loading = 'lazy';
  wrap.appendChild(iframe);
  wrap.addEventListener('click', e => e.stopPropagation());
  container.appendChild(wrap);
}
async function renderInstagramPreview(url, container) {
  const isReel = /\/(reel|reels)\//i.test(url);
  const a = document.createElement('a'); a.className='igPreview'; a.href=url; a.target='_blank'; a.rel='noopener noreferrer';
  a.addEventListener('click', e => e.stopPropagation());
  // Try to fetch OG image
  try {
    const res = await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(url), {signal:AbortSignal.timeout(5000)});
    if (res.ok) {
      const {contents} = await res.json();
      const doc = new DOMParser().parseFromString(contents||'','text/html');
      const gm = p => { const el=doc.querySelector(`meta[property="${p}"],meta[name="${p}"]`); return el?el.getAttribute('content'):''; };
      const img = gm('og:image'); const title = gm('og:title')||'';
      if (img) {
        const tw = document.createElement('div'); tw.className='igThumbWrap';
        const im = document.createElement('img'); im.src=img; im.alt=''; im.onerror=()=>tw.remove();
        tw.appendChild(im);
        if (isReel || /video/i.test(gm('og:type'))) { const pb=document.createElement('div'); pb.className='igPlayBtn'; tw.appendChild(pb); }
        a.appendChild(tw);
      }
      if (title) {
        const b=document.createElement('div'); b.className='igBody';
        b.innerHTML=`<svg class="igLogo" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="5" stroke="#E1306C" stroke-width="2"/><circle cx="12" cy="12" r="5" stroke="#E1306C" stroke-width="2"/><circle cx="18" cy="6" r="1.5" fill="#E1306C"/></svg><div class="igInfo"><div class="igSite">Instagram</div><div class="igTitle">${esc(title)}</div></div>`;
        a.appendChild(b); container.appendChild(a); return;
      }
    }
  } catch(e) {}
  // Fallback: simple card
  const b=document.createElement('div'); b.className='igBody';
  b.innerHTML=`<svg class="igLogo" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="5" stroke="#E1306C" stroke-width="2"/><circle cx="12" cy="12" r="5" stroke="#E1306C" stroke-width="2"/><circle cx="18" cy="6" r="1.5" fill="#E1306C"/></svg><div class="igInfo"><div class="igSite">Instagram</div><div class="igTitle">${isReel?'Reel':'게시물'}을 Instagram에서 보기</div></div>`;
  a.appendChild(b); container.appendChild(a);
}
async function renderOgPreview(url, container) {
  try {
    const res = await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(url), {signal:AbortSignal.timeout(5000)});
    if (!res.ok) return;
    const {contents} = await res.json();
    const doc = new DOMParser().parseFromString(contents||'','text/html');
    const gm = p => { const el=doc.querySelector(`meta[property="${p}"],meta[name="${p}"]`); return el?el.getAttribute('content'):''; };
    const title = gm('og:title')||doc.title||''; if (!title) return;
    const desc=gm('og:description')||gm('description')||'', img=gm('og:image')||'', site=gm('og:site_name')||(new URL(url)).hostname;
    const a=document.createElement('a'); a.className='linkPreview'; a.href=url; a.target='_blank'; a.rel='noopener noreferrer';
    if (img) {
      let imgSrc = img;
      if (imgSrc.startsWith('//')) imgSrc = 'https:' + imgSrc;
      else if (imgSrc.startsWith('/')) { const o = new URL(url); imgSrc = o.origin + imgSrc; }
      const im=document.createElement('img'); im.className='lpImg'; im.src=imgSrc; im.alt=''; im.onerror=()=>im.remove(); a.appendChild(im);
    }
    const b=document.createElement('div'); b.className='lpBody';
    b.innerHTML=`<div class="lpSite">${esc(site)}</div><div class="lpTitle">${esc(title)}</div>${desc?`<div class="lpDesc">${esc(desc)}</div>`:''}`;
    a.appendChild(b); container.appendChild(a);
  } catch(e) {}
}

function initRxWatcher(rid) {
  stopRxWatcher();
  _rxCallbacks.clear(); _rxRoomCache={};
  _rxRoomRef = db.ref('reactions/'+rid);
  _rxRoomRef.on('value', snap => {
    _rxRoomCache = snap.val()||{};
    _rxCallbacks.forEach((cb,mid) => { try { cb(_rxRoomCache[mid]||{}); } catch(e){} });
  });
}
function stopRxWatcher() {
  if (_rxRoomRef) { try{_rxRoomRef.off();}catch(e){} _rxRoomRef=null; }
  _rxRoomCache={}; _rxCallbacks.clear();
}
function watchRx(mid, bar) {
  const cb = data => {
    bar.innerHTML='';
    const tally={}, mine={};
    Object.entries(data).forEach(([uid,e])=>{ tally[e]=(tally[e]||0)+1; if(uid===myUid)mine[e]=1; });
    Object.entries(tally).forEach(([e,n])=>{
      const c=document.createElement('div'); c.className='reactChip'+(mine[e]?' mine':'');
      c.innerHTML=`${e} <span class="reactCount">${n}</span>`;
      c.addEventListener('click',()=>toggleRx(mid,e)); bar.appendChild(c);
    });
    scrollToBottom(false);
  };
  _rxCallbacks.set(mid, cb);
  cb(_rxRoomCache[mid]||{});
}
async function toggleRx(mid, emoji) {
  const ref=db.ref('reactions/'+roomId+'/'+mid+'/'+myUid);
  const snap=await ref.once('value');
  snap.val()===emoji ? await ref.remove() : await ref.set(emoji);
}

  q.addEventListener('click',()=>{
    const el=logEl.querySelector('[data-mid="'+CSS.escape(replyTo.mid||'')+'"]');
    if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.background='rgba(34,197,94,.08)';setTimeout(()=>el.style.background='',1200);}
  });
  return q;
}
function rebuildBubble(bubble, m) {
  bubble.innerHTML='';
  if (m.deleted){bubble.className='bubble deletedBubble';bubble.textContent='삭제된 메시지입니다.';return;}
  bubble.className='bubble';
  if (m.replyTo&&(m.replyTo.text||m.replyTo.imageUrl)) bubble.appendChild(buildQuoteEl(m.replyTo));
  if (m.imageUrl==='__uploading__') {
    const d=document.createElement('div');d.className='imgUploading';
    const sp=document.createElement('div');sp.className='imgUploadSpinner';
    const tx=document.createElement('span');tx.textContent='업로드 중...';
    d.appendChild(sp);d.appendChild(tx);bubble.appendChild(d);
  } else if (m.imageUrl) {
    const a=document.createElement('a');a.className='imgMsg';a.href=m.imageUrl;a.target='_blank';a.rel='noopener noreferrer';
    const img=document.createElement('img');img.src=m.imageUrl;img.alt='사진';img.loading='lazy';
    img.addEventListener('click',e=>{e.preventDefault();const ov=document.createElement('div');ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:999;display:flex;align-items:center;justify-content:center;cursor:zoom-out';const fi=document.createElement('img');fi.src=m.imageUrl;fi.style.cssText='max-width:94vw;max-height:90vh;border-radius:10px;object-fit:contain';ov.appendChild(fi);ov.addEventListener('click',()=>ov.remove());document.body.appendChild(ov);});
    a.appendChild(img);bubble.appendChild(a);
    if (m.text) { bubble.appendChild(document.createElement('br')); bubble.appendChild(linkifyText(String(m.text))); }
  } else {
    bubble.appendChild(linkifyText(String(m.text||'')));
  }
  if (m.edited){const em=document.createElement('span');em.className='editedMark';em.textContent='(수정됨)';bubble.appendChild(em);}
}

function renderMessage(m, isPending) {
  if (seen.has(m.messageId)) return;
  const mine = m.senderId === myUid;

  const wrap=document.createElement('div'); wrap.className='msg'; wrap.dataset.mid=m.messageId;
  const row=document.createElement('div'); row.className='row '+(mine?'me':'other');
  const bubble=document.createElement('div'); rebuildBubble(bubble,m);

  row.appendChild(bubble); wrap.appendChild(row);
  if (!isPending && !m.deleted && !m.imageUrl) {
    const url=extractUrl(String(m.text||''));
    if(url){
      const lpWrap=document.createElement('div');
      lpWrap.style.cssText=mine?'display:flex;justify-content:flex-end':'display:flex;justify-content:flex-start';
      renderLinkPreview(url,lpWrap);
      wrap.appendChild(lpWrap);
    }
  }

  const rxBar=document.createElement('div'); rxBar.className='reactionsBar';
  const rxAlign=document.createElement('div');
  rxAlign.style.cssText=mine?'display:flex;justify-content:flex-end':'display:flex;justify-content:flex-start';
  rxAlign.appendChild(rxBar); wrap.appendChild(rxAlign);
  if (!isPending && !m.deleted) watchRx(m.messageId, rxBar);

  const meta=document.createElement('div'); meta.className='meta'+(mine?' me':'');
  const who=document.createElement('span'); who.textContent=m.senderNick||'';
  const time=document.createElement('span'); time.textContent=fmt(m.ts||Date.now());
  meta.appendChild(who); meta.appendChild(time);
  if (mine && isPending) { const b=document.createElement('span');b.className='badgePending';b.textContent='전송 중';meta.appendChild(b); }
  wrap.appendChild(meta);

  if (!m.deleted) {
    let lt=null;
    const ctx=(e)=>{e.preventDefault();openCtx(m.messageId,m.senderId,wrap,bubble);};
    wrap.addEventListener('contextmenu',ctx);
    wrap.addEventListener('touchstart',()=>{lt=setTimeout(()=>openCtx(m.messageId,m.senderId,wrap,bubble),550);},{passive:true});
    wrap.addEventListener('touchend',()=>clearTimeout(lt));
    wrap.addEventListener('touchmove',()=>clearTimeout(lt));
  }

  logEl.appendChild(wrap);
  seen.set(m.messageId, {seq:Number(m.seq||0),metaEl:meta,senderId:m.senderId,wrapEl:wrap,bubbleEl:bubble,text:String(m.text||''),replyTo:m.replyTo||null,imageUrl:m.imageUrl||null});
}

function applyMsgUpdate(m) {
  const obj=seen.get(m.messageId); if(!obj) return;
  rebuildBubble(obj.bubbleEl, {text:String(m.text||''),deleted:!!m.deleted,edited:!!m.edited,replyTo:obj.replyTo||null,imageUrl:obj.imageUrl||null});
  obj.text=String(m.text||'');
}

function mergeServerMsg(m) {
  const wasPending=pending.has(m.messageId);
  if (!seen.has(m.messageId)) {
    renderMessage(m,false);
  } else if (wasPending) {
    const obj=seen.get(m.messageId);
    if (obj&&obj.bubbleEl&&!m.deleted) {
      rebuildBubble(obj.bubbleEl,m);
      const url=extractUrl(String(m.text||'')); if(url) renderLinkPreview(url,obj.wrapEl);
      const rxBar=obj.wrapEl&&obj.wrapEl.querySelector('.reactionsBar');
      if(rxBar) watchRx(m.messageId,rxBar);
    }
  }
  if (wasPending) pending.delete(m.messageId);
  const obj=seen.get(m.messageId);
  if (obj) {
    obj.seq=Number(m.seq||obj.seq||0);
    if (m.text!==undefined) obj.text=String(m.text||'');
    if (m.replyTo!==undefined) obj.replyTo=m.replyTo||null;
    if (m.imageUrl!==undefined) obj.imageUrl=m.imageUrl||null;
  }
  updateBadges(); updateReadBadges();
}

function updateBadges() {
  for (const [mid,obj] of seen) {
    if (!obj.metaEl) continue;
    Array.from(obj.metaEl.querySelectorAll('.badgePending,.badgeFail')).forEach(n=>n.remove());
    if (obj.senderId!==myUid) continue;
    if (pending.has(mid)) {
      const age=Date.now()-(pending.get(mid).createdAt||0);
      const b=document.createElement('span');
      if (age>12000) { b.className='badgeFail';b.textContent='전송 실패(재시도)';b.addEventListener('click',()=>retrySend(mid)); }
      else { b.className='badgePending';b.textContent='전송 중'; }
      obj.metaEl.appendChild(b);
    }
  }
}

let _readBadgeRic = 0;
function updateReadBadges() {
  // 타이핑 중 DOM 대량 조작 방지: idle 시점으로 지연
  if (_readBadgeRic) { (typeof cancelIdleCallback==='function'?cancelIdleCallback:clearTimeout)(_readBadgeRic); }
  _readBadgeRic = (typeof requestIdleCallback==='function'?requestIdleCallback:function(cb){return setTimeout(cb,80);})(function(){
    _readBadgeRic = 0;
    const others=Object.keys(_readsCache||{}).filter(u=>u!==myUid);
    const total=others.length;
    for (const [mid,obj] of seen) {
      if (obj.senderId!==myUid||!obj.metaEl) continue;
      const seq=Number(obj.seq||0);
      let readers=0;
      if(seq&&!pending.has(mid)) { for (const u of others) { if(Number((_readsCache[u]&&_readsCache[u].lastReadSeq)||0)>=seq) readers++; } }
      const label=(!seq||pending.has(mid))?'':(total<=1?(readers>=1?'읽음':'안읽음'):`읽음 ${readers}/${total}`);
      const existing=obj.metaEl.querySelector('.readBadge');
      if (!label) { if(existing) existing.remove(); continue; }
      if (existing) { if(existing.textContent!==label) existing.textContent=label; }
      else { const b=document.createElement('span'); b.className='readBadge'; b.textContent=label; obj.metaEl.appendChild(b); }
    }
  });
}

// ================================================================
// ★ 핵심 수정 1: subscribeMessages — 토큰 기반 구독 관리
//
// 문제: 기존 _subId(전역 카운터) 방식은 stopMessages()가 여러 곳에서
// 중복 호출될 때 카운터가 꼬여 신규 구독의 콜백까지 차단되는 버그 발생.
//
// 해결: 구독마다 고유한 { alive: true } 토큰 객체를 클로저로 캡처.
// stopMessages()는 토큰의 alive를 false로만 바꾸고 ref.off()를 호출.
// 콜백은 토큰의 alive 여부로만 유효성 검사 → 전역 상태 의존 제거.
// ================================================================
function stopMessages() {
  // 현재 토큰 무효화
  if (_msgToken) {
    _msgToken.alive = false;
    _msgToken = null;
  }
  // Firebase 리스너 해제
  if (_msgRef) {
    try { _msgRef.off(); } catch(e) {}
    _msgRef = null;
  }
}

function subscribeMessages(rid) {
  // 기존 구독 중단 (토큰 무효화 + 리스너 해제)
  stopMessages();
  stopRxWatcher();

  // DOM 및 상태 완전 초기화
  logEl.innerHTML = '';
  seen.clear();
  pending.clear();
  afterSeq = 0;
  _earliestSeq = Infinity;
  _loadingOlder = false;

  // ★ 이번 구독 전용 토큰 생성 (클로저로 캡처)
  const token = { alive: true };
  _msgToken = token;

  initRxWatcher(rid);

  const ref = db.ref('messages/'+rid).orderByChild('seq').limitToLast(MSG_LIMIT);
  _msgRef = ref;

  let initialBatchDone = false;

  // ── child_added: 기존 + 신규 메시지 처리 ──
  ref.on('child_added', snap => {
    // ★ 전역 카운터 대신 토큰으로 유효성 검사
    if (!token.alive) return;
    const m = snap.val(); if (!m) return;

    const msg = {
      messageId: String(m.messageId||snap.key||''),
      senderId:  String(m.senderId||''),
      senderNick:String(m.senderNick||''),
      text:      String(m.text||''),
      ts:        Number(m.ts||0),
      seq:       Number(m.seq||0),
      deleted:   !!m.deleted,
      edited:    !!m.edited,
      replyTo:   m.replyTo||null,
      imageUrl:  m.imageUrl||null
    };

    afterSeq = Math.max(afterSeq, msg.seq);
    if (msg.seq > 0) _earliestSeq = Math.min(_earliestSeq, msg.seq);
    const isNew = !seen.has(msg.messageId);
    mergeServerMsg(msg);

    // 알림: 초기배치 완료 후 + 새 메시지 + 상대방 + 최근 60초 내
    if (initialBatchDone && isNew && msg.senderId !== myUid && (Date.now()-msg.ts) < 60000) {
      if (shouldNotify()) {
        bumpUnread(); playBeep();
        // ★ OneSignal 푸시가 활성 + 백그라운드이면 로컬 알림 스킵 (중복 방지)
        // 포그라운드(탭 비활성 등)에서만 로컬 알림 표시
        const osPushActive = window.__OS && window.__OS.User && window.__OS.User.PushSubscription && window.__OS.User.PushSubscription.optedIn;
        if (!osPushActive || !document.hidden) notifyMsg(msg);
      }
      else if (isNearBottom()) clearUnread();
    }

    if (initialBatchDone) { scrollToBottom(false); markRead(); }
  });

  // ── child_changed: 수정/삭제 반영 ──
  ref.on('child_changed', snap => {
    if (!token.alive) return;
    const m = snap.val(); if (!m) return;
    applyMsgUpdate({
      messageId: String(m.messageId||snap.key||''),
      text:      String(m.text||''),
      deleted:   !!m.deleted,
      edited:    !!m.edited
    });
  });

  // ── once('value'): 기존 child_added가 모두 완료된 뒤 발화
  //    initialBatchDone = true로 변경 후 스크롤/읽음 처리 ──
  ref.once('value', () => {
    if (!token.alive) return;
    initialBatchDone = true;
    // 이전 대화가 더 있을 수 있으면 "이전 대화 보기" 버튼 표시
    if (_earliestSeq > 1 && seen.size >= MSG_LIMIT) {
      showLoadMoreButton();
    }
    requestAnimationFrame(() => {
      if (!token.alive) return;
      logEl.scrollTop = logEl.scrollHeight;
      setTimeout(() => {
        if (!token.alive) return;
        logEl.scrollTop = logEl.scrollHeight;
        markRead(); updateBadges(); updateReadBadges();
      }, 200);
    });
  });
}

// ================================================================
// LOAD OLDER MESSAGES — 이전 대화 불러오기
// ================================================================
function showLoadMoreButton() {
  // 이미 있으면 제거 후 재생성
  const existing = logEl.querySelector('.loadMoreWrap');
  if (existing) existing.remove();
  const wrap = document.createElement('div');
  wrap.className = 'loadMoreWrap';
  const btn = document.createElement('button');
  btn.className = 'loadMoreBtn';
  btn.textContent = '이전 대화 보기';
  btn.addEventListener('click', () => loadOlderMessages());
  wrap.appendChild(btn);
  logEl.prepend(wrap);
}

async function loadOlderMessages() {
  if (_loadingOlder || !roomId || _earliestSeq <= 1) return;
  _loadingOlder = true;
  const btn = logEl.querySelector('.loadMoreBtn');
  if (btn) { btn.disabled = true; btn.textContent = '불러오는 중...'; }

  // 스크롤 위치 보존을 위해 현재 높이 저장
  const prevHeight = logEl.scrollHeight;
  const prevTop = logEl.scrollTop;

  try {
    const endSeq = _earliestSeq - 1;
    // seq가 endSeq 이하인 메시지 중 마지막 LOAD_MORE_LIMIT개
    const snap = await db.ref('messages/'+roomId)
      .orderByChild('seq')
      .endAt(endSeq)
      .limitToLast(LOAD_MORE_LIMIT)
      .once('value');

    const messages = [];
    snap.forEach(child => {
      const m = child.val();
      if (!m) return;
      messages.push({
        messageId: String(m.messageId||child.key||''),
        senderId:  String(m.senderId||''),
        senderNick:String(m.senderNick||''),
        text:      String(m.text||''),
        ts:        Number(m.ts||0),
        seq:       Number(m.seq||0),
        deleted:   !!m.deleted,
        edited:    !!m.edited,
        replyTo:   m.replyTo||null,
        imageUrl:  m.imageUrl||null
      });
    });

    // seq 순으로 정렬
    messages.sort((a,b) => a.seq - b.seq);

    // loadMore 버튼 제거
    const loadMoreWrap = logEl.querySelector('.loadMoreWrap');
    if (loadMoreWrap) loadMoreWrap.remove();

    // 기존 첫 번째 메시지 요소 참조
    const firstMsg = logEl.querySelector('.msg');

    // 메시지를 DOM에 삽입 (기존 메시지 위에)
    for (const m of messages) {
      if (seen.has(m.messageId)) continue;
      if (m.seq > 0) _earliestSeq = Math.min(_earliestSeq, m.seq);

      const mine = m.senderId === myUid;
      const wrap = document.createElement('div'); wrap.className = 'msg'; wrap.dataset.mid = m.messageId;
      const row = document.createElement('div'); row.className = 'row '+(mine?'me':'other');
      const bubble = document.createElement('div'); rebuildBubble(bubble, m);

      if (!m.deleted && !m.imageUrl) {
        const url = extractUrl(String(m.text||'')); if(url) renderLinkPreview(url, wrap);
      }
      row.appendChild(bubble); wrap.appendChild(row);

      const rxBar = document.createElement('div'); rxBar.className = 'reactionsBar';
      const rxAlign = document.createElement('div');
      rxAlign.style.cssText = mine ? 'display:flex;justify-content:flex-end' : 'display:flex;justify-content:flex-start';
      rxAlign.appendChild(rxBar); wrap.appendChild(rxAlign);
      if (!m.deleted) watchRx(m.messageId, rxBar);

      const meta = document.createElement('div'); meta.className = 'meta'+(mine?' me':'');
      const who = document.createElement('span'); who.textContent = m.senderNick||'';
      const time = document.createElement('span'); time.textContent = fmt(m.ts||Date.now());
      meta.appendChild(who); meta.appendChild(time);
      wrap.appendChild(meta);

      if (!m.deleted) {
        let lt = null;
        const ctx = (e) => { e.preventDefault(); openCtx(m.messageId,m.senderId,wrap,bubble); };
        wrap.addEventListener('contextmenu', ctx);
        wrap.addEventListener('touchstart', () => { lt=setTimeout(()=>openCtx(m.messageId,m.senderId,wrap,bubble),550); }, {passive:true});
        wrap.addEventListener('touchend', () => clearTimeout(lt));
        wrap.addEventListener('touchmove', () => clearTimeout(lt));
      }

      if (firstMsg) logEl.insertBefore(wrap, firstMsg);
      else logEl.appendChild(wrap);

      seen.set(m.messageId, {seq:Number(m.seq||0),metaEl:meta,senderId:m.senderId,wrapEl:wrap,bubbleEl:bubble,text:String(m.text||''),replyTo:m.replyTo||null,imageUrl:m.imageUrl||null});
    }

    // 더 로드할 메시지가 있으면 버튼 다시 표시
    if (messages.length >= LOAD_MORE_LIMIT && _earliestSeq > 1) {
      showLoadMoreButton();
    }

    // 스크롤 위치 보존: 새로 추가된 높이만큼 보정
    requestAnimationFrame(() => {
      const newHeight = logEl.scrollHeight;
      logEl.scrollTop = prevTop + (newHeight - prevHeight);
    });

  } catch(e) {
    console.error('loadOlderMessages error:', e);
    showToast('이전 대화를 불러오지 못했습니다');
  } finally {
    _loadingOlder = false;
  }
}

// ================================================================
// MESSAGE SEARCH — 키워드 검색
// ================================================================
function openSearch() {
  searchBar.style.display = 'flex';
  searchInput.value = '';
  searchInfo.textContent = '';
  searchUp.disabled = true;
  searchDown.disabled = true;
  _searchResults = [];
  _searchIndex = -1;
  _searchKeyword = '';
  clearSearchHighlights();
  setTimeout(() => searchInput.focus(), 100);
}

function closeSearch() {
  searchBar.style.display = 'none';
  searchInput.value = '';
  searchInfo.textContent = '';
  _searchResults = [];
  _searchIndex = -1;
  _searchKeyword = '';
  clearSearchHighlights();
}

function clearSearchHighlights() {
  logEl.querySelectorAll('.searchHighlight,.searchHighlightCurrent').forEach(el => {
    const parent = el.parentNode;
    parent.replaceChild(document.createTextNode(el.textContent), el);
    parent.normalize();
  });
}

searchBtnEl.addEventListener('click', () => {
  if (searchBar.style.display === 'flex') closeSearch();
  else openSearch();
});

searchCloseBtn.addEventListener('click', closeSearch);

searchInput.addEventListener('input', () => {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => executeSearch(searchInput.value.trim()), 350);
});

searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    if (e.shiftKey) navigateSearch(-1);
    else navigateSearch(1);
  } else if (e.key === 'Escape') {
    closeSearch();
  }
});

searchUp.addEventListener('click', () => navigateSearch(-1));
searchDown.addEventListener('click', () => navigateSearch(1));

async function executeSearch(keyword) {
  clearSearchHighlights();
  _searchResults = [];
  _searchIndex = -1;
  _searchKeyword = keyword;

  if (!keyword || !roomId) {
    searchInfo.textContent = '';
    searchUp.disabled = true;
    searchDown.disabled = true;
    return;
  }

  searchInfo.textContent = '검색 중...';
  searchUp.disabled = true;
  searchDown.disabled = true;

  try {
    // Firebase에서 해당 방의 전체 메시지 가져오기
    const snap = await db.ref('messages/' + roomId).orderByChild('seq').once('value');
    const kw = keyword.toLowerCase();
    const results = [];

    snap.forEach(child => {
      const m = child.val();
      if (!m || m.deleted) return;
      const text = String(m.text || '');
      if (text.toLowerCase().includes(kw)) {
        results.push({
          messageId: String(m.messageId || child.key || ''),
          seq: Number(m.seq || 0),
          text: text,
          senderNick: String(m.senderNick || ''),
          ts: Number(m.ts || 0)
        });
      }
    });

    // 검색 중 키워드가 바뀌었으면 무시
    if (_searchKeyword !== keyword) return;

    // seq 순 정렬 (오래된 것부터)
    results.sort((a, b) => a.seq - b.seq);
    _searchResults = results;

    if (results.length === 0) {
      searchInfo.textContent = '결과 없음';
      searchUp.disabled = true;
      searchDown.disabled = true;
    } else {
      // 가장 최근 결과(마지막)부터 시작
      _searchIndex = results.length - 1;
      updateSearchInfo();
      searchUp.disabled = results.length <= 1;
      searchDown.disabled = results.length <= 1;
      await showSearchResult(_searchIndex);
    }
  } catch (e) {
    console.error('Search error:', e);
    searchInfo.textContent = '검색 실패';
  }
}

function updateSearchInfo() {
  if (_searchResults.length === 0) {
    searchInfo.textContent = '결과 없음';
  } else {
    searchInfo.textContent = `${_searchIndex + 1} / ${_searchResults.length}`;
  }
}

function navigateSearch(dir) {
  if (_searchResults.length === 0) return;
  // dir: 1 = 다음(아래/최신), -1 = 이전(위/오래된)
  let next = _searchIndex + dir;
  if (next < 0) next = _searchResults.length - 1;
  if (next >= _searchResults.length) next = 0;
  _searchIndex = next;
  updateSearchInfo();
  showSearchResult(_searchIndex);
}

async function showSearchResult(idx) {
  const result = _searchResults[idx];
  if (!result) return;

  // 메시지가 현재 DOM에 없으면 로드
  if (!seen.has(result.messageId)) {
    await loadMessagesAroundSeq(result.seq);
  }

  // 이전 하이라이트 초기화
  clearSearchHighlights();

  // 해당 메시지 요소 찾기
  const entry = seen.get(result.messageId);
  if (!entry || !entry.wrapEl) return;

  // 버블 내 텍스트에 하이라이트 적용
  highlightInBubble(entry.bubbleEl, _searchKeyword, true);

  // 다른 DOM에 있는 검색 결과에도 하이라이트 (현재 결과 제외)
  for (let i = 0; i < _searchResults.length; i++) {
    if (i === idx) continue;
    const other = seen.get(_searchResults[i].messageId);
    if (other && other.bubbleEl) {
      highlightInBubble(other.bubbleEl, _searchKeyword, false);
    }
  }

  // 해당 메시지로 스크롤
  entry.wrapEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function highlightInBubble(bubbleEl, keyword, isCurrent) {
  if (!bubbleEl || !keyword) return;
  const cls = isCurrent ? 'searchHighlightCurrent' : 'searchHighlight';
  const walker = document.createTreeWalker(bubbleEl, NodeFilter.SHOW_TEXT, null, false);
  const textNodes = [];
  while (walker.nextNode()) textNodes.push(walker.currentNode);

  const kw = keyword.toLowerCase();
  for (const node of textNodes) {
    const val = node.nodeValue;
    const lower = val.toLowerCase();
    const idx = lower.indexOf(kw);
    if (idx === -1) continue;

    // replyQuote 내부는 건너뛰기
    if (node.parentElement && node.parentElement.closest('.replyQuote')) continue;

    const before = val.substring(0, idx);
    const match = val.substring(idx, idx + keyword.length);
    const after = val.substring(idx + keyword.length);

    const span = document.createElement('span');
    span.className = cls;
    span.textContent = match;

    const parent = node.parentNode;
    if (before) parent.insertBefore(document.createTextNode(before), node);
    parent.insertBefore(span, node);
    if (after) parent.insertBefore(document.createTextNode(after), node);
    parent.removeChild(node);
  }
}

async function loadMessagesAroundSeq(targetSeq) {
  // targetSeq 주변의 메시지를 로드
  const batchSize = 50;
  const startSeq = Math.max(1, targetSeq - Math.floor(batchSize / 2));
  const endSeq = targetSeq + Math.floor(batchSize / 2);

  try {
    const snap = await db.ref('messages/' + roomId)
      .orderByChild('seq')
      .startAt(startSeq)
      .endAt(endSeq)
      .once('value');

    const messages = [];
    snap.forEach(child => {
      const m = child.val();
      if (!m) return;
      messages.push({
        messageId: String(m.messageId || child.key || ''),
        senderId: String(m.senderId || ''),
        senderNick: String(m.senderNick || ''),
        text: String(m.text || ''),
        ts: Number(m.ts || 0),
        seq: Number(m.seq || 0),
        deleted: !!m.deleted,
        edited: !!m.edited,
        replyTo: m.replyTo || null,
        imageUrl: m.imageUrl || null
      });
    });

    messages.sort((a, b) => a.seq - b.seq);

    for (const m of messages) {
      if (seen.has(m.messageId)) continue;
      if (m.seq > 0) _earliestSeq = Math.min(_earliestSeq, m.seq);

      // 올바른 위치에 삽입 (seq 순서 유지)
      const mine = m.senderId === myUid;
      const wrap = document.createElement('div'); wrap.className = 'msg'; wrap.dataset.mid = m.messageId;
      const row = document.createElement('div'); row.className = 'row ' + (mine ? 'me' : 'other');
      const bubble = document.createElement('div'); rebuildBubble(bubble, m);

      if (!m.deleted && !m.imageUrl) {
        const url = extractUrl(String(m.text || '')); if (url) renderLinkPreview(url, wrap);
      }
      row.appendChild(bubble); wrap.appendChild(row);

      const rxBar = document.createElement('div'); rxBar.className = 'reactionsBar';
      const rxAlign = document.createElement('div');
      rxAlign.style.cssText = mine ? 'display:flex;justify-content:flex-end' : 'display:flex;justify-content:flex-start';
      rxAlign.appendChild(rxBar); wrap.appendChild(rxAlign);
      if (!m.deleted) watchRx(m.messageId, rxBar);

      const meta = document.createElement('div'); meta.className = 'meta' + (mine ? ' me' : '');
      const who = document.createElement('span'); who.textContent = m.senderNick || '';
      const time = document.createElement('span'); time.textContent = fmt(m.ts || Date.now());
      meta.appendChild(who); meta.appendChild(time);
      wrap.appendChild(meta);

      if (!m.deleted) {
        let lt = null;
        const ctx = (e) => { e.preventDefault(); openCtx(m.messageId, m.senderId, wrap, bubble); };
        wrap.addEventListener('contextmenu', ctx);
        wrap.addEventListener('touchstart', () => { lt = setTimeout(() => openCtx(m.messageId, m.senderId, wrap, bubble), 550); }, { passive: true });
        wrap.addEventListener('touchend', () => clearTimeout(lt));
        wrap.addEventListener('touchmove', () => clearTimeout(lt));
      }

      // seq 순서에 맞게 삽입 위치 찾기
      let inserted = false;
      const allMsgs = logEl.querySelectorAll('.msg');
      for (const existing of allMsgs) {
        const existingEntry = seen.get(existing.dataset.mid);
        if (existingEntry && existingEntry.seq > m.seq) {
          logEl.insertBefore(wrap, existing);
          inserted = true;
          break;
        }
      }
      if (!inserted) {
        // loadMoreWrap 뒤에 삽입
        const loadMoreWrap = logEl.querySelector('.loadMoreWrap');
        if (loadMoreWrap && loadMoreWrap.nextSibling) {
          const firstMsg = logEl.querySelector('.msg');
          if (firstMsg) {
            const firstEntry = seen.get(firstMsg.dataset.mid);
            if (firstEntry && firstEntry.seq > m.seq) {
              logEl.insertBefore(wrap, firstMsg);
              inserted = true;
            }
          }
        }
        if (!inserted) logEl.appendChild(wrap);
      }

      seen.set(m.messageId, { seq: Number(m.seq || 0), metaEl: meta, senderId: m.senderId, wrapEl: wrap, bubbleEl: bubble, text: String(m.text || ''), replyTo: m.replyTo || null, imageUrl: m.imageUrl || null });
    }

    // loadMore 버튼 갱신
    if (_earliestSeq > 1) {
      const existing = logEl.querySelector('.loadMoreWrap');
      if (!existing) showLoadMoreButton();
    }

  } catch (e) {
    console.error('loadMessagesAroundSeq error:', e);
  }
}

function stopPresence() {
  if (_presInterval) { clearInterval(_presInterval); _presInterval=null; }
  if (_presListenRef) { try{_presListenRef.off();}catch(e){} _presListenRef=null; }
  if (_presRef) {
    // 즉시 lastActive를 0으로 만들어 collectSubIds가 "방 밖"으로 인식하게 함
    try { _presRef.update({ lastActive: 0, vis: 'hidden' }).catch(()=>{}); } catch(e) {}
    try { _presRef.onDisconnect().cancel(); } catch(e) {}
    _presRef = null;
  }
}
function startPresence(rid) {
  stopPresence();
  _presRef = db.ref('presence/'+rid+'/'+myUid);
  const write = () => _presRef.set({nick:myNick,lastActive:SV.TIMESTAMP}).catch(()=>{});
  _presRef.onDisconnect().remove();
  write();
  _presInterval = setInterval(write, 30000);
  _presListenRef = db.ref('presence/'+rid).orderByChild('lastActive').limitToLast(30);
  _presListenRef.on('value', snap => {
    const v=snap.val()||{}, now=Date.now(), online=[];
    Object.keys(v).forEach(u=>{ const p=v[u]||{},ts=Number(p.lastActive||0); if(ts&&(now-ts)<=75000&&p.nick)online.push(p.nick); });
    const uniq=[],s=new Set(); for(const n of online){const t=(n||'').trim();if(!t||s.has(t))continue;s.add(t);uniq.push(t);}
    const nicks=uniq.slice(0,12);
    (typeof requestIdleCallback==='function'?requestIdleCallback:function(cb){setTimeout(cb,60);})(()=>setHeader(nicks));
  });
}
// visibilitychange: lastActive 갱신
// ★ 백그라운드→ lastActive:0 (즉시 push 대상), 포그라운드→ lastActive 복원
document.addEventListener('visibilitychange', () => {
  if (!_presRef) return;
  if (document.hidden) {
    _presRef.update({ lastActive: 0 }).catch(()=>{});
  } else {
    _presRef.update({ lastActive: SV.TIMESTAMP, nick: myNick }).catch(()=>{});
  }
});

  if(_typListenRef){try{_typListenRef.off();}catch(e){}_typListenRef=null;}
  if(_typRef){try{_typRef.remove().catch(()=>{});}catch(e){}_typRef=null;}
  if(_typInputHandler){inputEl.removeEventListener('input',_typInputHandler);_typInputHandler=null;}
  if(_typFocusHandler){inputEl.removeEventListener('focus',_typFocusHandler);_typFocusHandler=null;}
  if(_typBlurHandler){inputEl.removeEventListener('blur',_typBlurHandler);_typBlurHandler=null;}
  if(_typUnloadHandler){window.removeEventListener('beforeunload',_typUnloadHandler);_typUnloadHandler=null;}
  _typingOn=false; _lastTypeAt=0; showTyping('');
}
function markTypeActivity() { _lastTypeAt=Date.now(); }
function startTyping(rid) {
  stopTyping();
  _typListenRef=db.ref('typing/'+rid);
  _typListenRef.on('value',snap=>{
    const v=snap.val()||{},now=Date.now();let best=null;
    Object.keys(v).forEach(u=>{if(u===myUid)return;const t=v[u]||{},until=Number(t.until||0);if(until>now&&(!best||until>best.until))best={nick:String(t.nick||''),until};});
    showTyping(best&&best.nick?best.nick+' 님이 입력 중입니다':'');
  });
  _typRef=db.ref('typing/'+rid+'/'+myUid);
  _typRef.onDisconnect().remove();
  _typInterval=setInterval(()=>{
    if(!roomId) return;
    const now=Date.now();
    const should=(document.activeElement===inputEl)&&inputEl.value.trim().length>0&&(now-_lastTypeAt)<=4500;
    if(should){
      const doSet=()=>{if(_typRef)_typRef.set({nick:myNick,until:Date.now()+6500});_typingOn=true;};
      if(typeof requestIdleCallback==='function'){requestIdleCallback(doSet,{timeout:1500});}else{doSet();}
    }
    else if(_typingOn){_typRef.remove();_typingOn=false;}
  },3000);
  _typInputHandler = null; // onInput()이 이미 markTypeActivity 호출하므로 중복 리스너 제거
  _typFocusHandler = markTypeActivity;
  _typBlurHandler = ()=>{try{if(_typRef)_typRef.remove();}catch(e){}_typingOn=false;};
  _typUnloadHandler = ()=>{try{if(_typRef)_typRef.remove();}catch(e){}};
  inputEl.addEventListener('focus',_typFocusHandler);
  inputEl.addEventListener('blur',_typBlurHandler);
  window.addEventListener('beforeunload',_typUnloadHandler);
}

async function syncPushSub() {
  try {
    if(!window.__OS||!myUid) return;
    const subId = window.__OS.User.PushSubscription.id || '';
    if(!window.__OS.User.PushSubscription.optedIn || !subId) return;
    const myOsId = window.__OS.User.onesignalId || null;
    const snap = await db.ref('pushSubs/'+myUid).once('value');
    const existing = snap.val() || {};
    const updates = {};
    // ★ 현재 구독 외 모든 이전 구독 제거 (기기 구분 없이)
    // 동일 기기에서 재구독 시 onesignalId가 null일 수 있어 기기 비교 불가
    // → 최신 구독 1개만 유지하여 중복 알림 방지
    Object.keys(existing).forEach(id => {
      if (id !== subId) updates[id] = null;
    });
    updates[subId] = { onesignalId: myOsId, nick: myNick||'', updatedAt: SV.TIMESTAMP };
    await db.ref('pushSubs/'+myUid).update(updates);
  } catch(e) {}
}
let _pushSyncT=null;
function schedulePushSync() { if(_pushSyncT)clearTimeout(_pushSyncT); _pushSyncT=setTimeout(syncPushSub,400); }
window.__schedulePushSync=schedulePushSync;

async function collectSubIds(rid) {
  try {
    // members + presence 동시에 읽어 타이밍 오차 최소화
    const [mSnap, pSnap] = await Promise.all([
      db.ref('roomMembers/'+rid).once('value'),
      db.ref('presence/'+rid).once('value'),
    ]);
    const members = mSnap.val() || {};
    const pres    = pSnap.val() || {};
    const now     = Date.now();

    // ─── lastActive가 최근이면 "방 안에 있는 중"으로 판단 → push 제외
    // ★ ACTIVE_MS는 하트비트(30초)보다 커야 함. 백그라운드 전환 시 lastActive=0이므로
    //    방에 있는 사람은 항상 최근 30초 이내 활동 기록 있음 → push 제외됨
    //    방을 나가거나 백그라운드 가면 lastActive=0 → 즉시 push 대상
    const ACTIVE_MS = 45_000;           // 45초 (하트비트 30초 + 여유 15초)
    const STALE_MS  = 30 * 86400_000;  // 30일 이상 된 구독은 stale로 무시

    const uids = Object.keys(members).filter(u => {
      if (u === myUid) return false;           // 본인 제외
      const ts = Number((pres[u] || {}).lastActive || 0);
      return !(ts && (now - ts) <= ACTIVE_MS); // 90초 이내 활동 = 방 보는 중 → 제외
    });

    if (!uids.length) return [];

    const ss = await Promise.all(uids.map(u => db.ref('pushSubs/'+u).once('value')));
    const ids = [];
    ss.forEach(s => {
      // ★ 유저당 가장 최신 구독 1개만 사용 (중복 알림 방지)
      let best = null, bestTs = 0;
      Object.entries(s.val() || {}).forEach(([subId, data]) => {
        if (!subId) return;
        const updated = Number((data && data.updatedAt) || 0);
        // 30일 이상 된 stale 구독 무시
        if (updated && (now - updated) > STALE_MS) return;
        if (updated >= bestTs) { best = subId; bestTs = updated; }
      });
      if (best) ids.push(best);
    });

    return ids;
  } catch(e) { return []; }
}

// ================================================================
// ★ 핵심 수정 2: enterRoom — 중복 진입 방지 및 구독 단일화
//
// 문제: 기존 _enterDebounce(setTimeout 0) 패턴은 빠른 연속 호출 시
// 첫 번째 호출의 Promise가 영원히 resolve되지 않는 버그 발생.
// 또한 enterRoom과 subscribeMessages 양쪽에서 stopMessages()를 호출해
// _subId가 과도하게 증가하여 신규 구독 콜백까지 차단.
//
// 해결:
// 1. _enteringRoom 플래그로 중복 진입만 방지 (setTimeout 제거)
// 2. enterRoom에서 stopMessages() 제거 → subscribeMessages 내부에서만 호출
// ================================================================
async function enterRoom(rid, infoOpt) {
  rid = String(rid||'').trim(); if (!rid) return;

  // 이미 진입 중이면 무시 (중복 클릭 방지)
  if (_enteringRoom) return;
  _enteringRoom = true;

  try {
    // ★ stopMessages는 subscribeMessages 안에서만 호출 (중복 제거)
    stopPresence(); stopTyping(); stopReads();

    const info = infoOpt || await loadRoomInfo(rid).catch(() => null);
    if (!info) { showHome(); return; }

    // 비밀번호 미확인된 경우만 확인
    if (!info._ok) {
      const ok = await ensureRoomAccess(info);
      if (!ok) { try{history.pushState({},'',NAV_URL);}catch(e){} showHome(); return; }
    }

    roomId = rid;
    roomName = info.roomName;
    ownerUid = info.ownerUid;

    db.ref('roomMembers/'+roomId+'/'+myUid).set({nick:myNick,joinedAt:SV.TIMESTAMP}).catch(()=>{});
    // 계정 단위로 마지막 방 기억
    saveUserSettings({ lastRoom: { roomId: rid, roomName: info.roomName, ts: Date.now() } });
    clearUnread();
    showChat();
    setHeader([]);
    startPresence(roomId);
    startTyping(roomId);
    startReads(roomId);
    // ★ subscribeMessages가 내부에서 stopMessages() 호출 → 이전 구독 정리 후 새 구독
    subscribeMessages(roomId);
  } catch(e) {
    console.error('enterRoom error:', e);
  } finally {
    _enteringRoom = false;
  }
}

let pendingShareText = '';
function initShareTarget() {
  const p = new URLSearchParams(location.search);
  if (!p.has('share')) return;
  const parts = [p.get('title')||'', p.get('text')||'', p.get('url')||''].map(s=>s.trim()).filter(Boolean);
  // 중복 제거 (text 안에 url이 이미 포함된 경우)
  const url = p.get('url')||'';
  const text = p.get('text')||'';
  const title = p.get('title')||'';
  let composed = text;
  if (url && !text.includes(url)) composed = (composed ? composed+'\n' : '') + url;
  if (title && !composed.includes(title)) composed = (title ? title+'\n' : '') + composed;
  pendingShareText = composed.trim();
  if (!pendingShareText) return;
  // URL에서 share 파라미터 제거 (새로고침 시 재공유 방지)
  try { history.replaceState({}, '', location.pathname + (p.get('roomId') ? '?roomId='+encodeURIComponent(p.get('roomId')) : '')); } catch(e){}
}

let _prevInputH = 24;
let _prevInputLen = 0;
let _inputMirror = null;
let _mirrorWidth = '';
function _getInputMirror() {
  if (!_inputMirror) {
    _inputMirror = document.createElement('textarea');
    _inputMirror.setAttribute('tabindex', '-1');
    _inputMirror.setAttribute('aria-hidden', 'true');
    _inputMirror.style.cssText = 'position:fixed;top:-9999px;left:0;visibility:hidden;pointer-events:none;overflow:hidden;border:0;padding:0;margin:0;resize:none;white-space:pre-wrap;word-wrap:break-word;font:16px/24px -apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif';
    document.body.appendChild(_inputMirror);
  }
  // 너비만 캐싱하여 getComputedStyle 호출 최소화
  const w = inputEl.offsetWidth + 'px';
  if (w !== _mirrorWidth) { _mirrorWidth = w; _inputMirror.style.width = w; }
  return _inputMirror;
}
let _resizeRaf = 0;
function _getInputMaxH() { return Math.max(120, Math.round(window.innerHeight * 0.4)); }
function _doResize() {
  _resizeRaf = 0;
  const val = inputEl.value || '';
  const maxH = _getInputMaxH();
  if (!val || !val.includes('\n')) {
    if (_prevInputH !== 24) {
      _prevInputH = 24;
      _prevInputLen = val.length;
      inputEl.style.height = '24px';
      inputEl.style.overflowY = 'hidden';
      document.documentElement.style.setProperty('--composerH', '64px');
    }
    _prevInputLen = val.length;
    return;
  }
  // 글자 수가 줄지 않았고 높이가 이미 max면 측정 스킵
  if (val.length >= _prevInputLen && _prevInputH >= maxH) {
    _prevInputLen = val.length;
    return;
  }
  _prevInputLen = val.length;
  // 멀티라인: 숨겨진 미러 textarea로 높이 측정 (깜빡임 제거)
  const m = _getInputMirror();
  m.value = val;
  const sh = m.scrollHeight;
  const h = Math.max(24, Math.min(sh, maxH));
  if (h !== _prevInputH) {
    _prevInputH = h;
    inputEl.style.height = h + 'px';
    inputEl.style.overflowY = h >= maxH ? 'auto' : 'hidden';
    // offsetHeight 대신 계산값 사용 — 강제 reflow 방지
    document.documentElement.style.setProperty('--composerH', Math.max(64, h + 40) + 'px');
  }
}
function autoResizeInput() {
  // rAF로 디바운스 — input 이벤트를 블로킹하지 않아 타이핑이 가벼워짐
  if (!_resizeRaf) _resizeRaf = requestAnimationFrame(_doResize);
}
let _prevSendDisabled = true;
let _lastMarkType = 0;
let _isComposing = false;
inputEl.addEventListener('compositionstart', () => { _isComposing = true; });
inputEl.addEventListener('compositionend', () => {

function onInput() {
  // IME 조합 중(한글 등)에는 처리 스킵 — 조합 완료 시 compositionend에서 호출

async function compressToBase64(file) {
  return new Promise(resolve => {
    const img=new Image(), url=URL.createObjectURL(file);
    img.onload=()=>{
      const MAX=800; let w=img.width, h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      resolve(c.toDataURL('image/jpeg',0.72));
    };
    img.onerror=()=>{URL.revokeObjectURL(url);resolve(null);};
    img.src=url;
  });
}
