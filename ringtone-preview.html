<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>벨소리 미리듣기</title>
<style>
*{box-sizing:border-box;margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px;gap:32px}
h1{font-size:22px;font-weight:800;letter-spacing:-.3px}
.card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:24px;width:100%;max-width:400px;backdrop-filter:blur(10px)}
.card h2{font-size:16px;font-weight:700;margin-bottom:6px}
.card p{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:16px;line-height:1.5}
.btnRow{display:flex;gap:10px;flex-wrap:wrap}
.btn{padding:12px 20px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;transition:transform .1s,box-shadow .2s}
.btn:active{transform:scale(.95)}
.play{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;box-shadow:0 4px 16px rgba(34,197,94,.4)}
.stop{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.15)}
.current{border-left:3px solid #3b82f6}
.new{border-left:3px solid #f59e0b}
.badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;margin-bottom:10px}
.badge.blue{background:rgba(59,130,246,.2);color:#60a5fa}
.badge.orange{background:rgba(245,158,11,.2);color:#fbbf24}
.playing{animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
</style>
</head>
<body>
<h1>발신음 미리듣기</h1>

<div class="card current">
  <span class="badge blue">현재 적용된 소리</span>
  <h2>A. 한국식 콜백톤</h2>
  <p>425Hz + 480Hz 이중 사인파. 깔끔하고 무난한 "뚜르르..."</p>
  <div class="btnRow">
    <button class="btn play" onclick="playA(this)">재생</button>
    <button class="btn stop" onclick="stopAll()">정지</button>
  </div>
</div>

<div class="card new">
  <span class="badge orange">새 후보 1</span>
  <h2>B. 따뜻한 트라이톤 멜로디</h2>
  <p>세 음이 부드럽게 올라갔다 내려오는 장난끼 있는 벨소리. 카카오톡 보이스톡 느낌.</p>
  <div class="btnRow">
    <button class="btn play" onclick="playB(this)">재생</button>
    <button class="btn stop" onclick="stopAll()">정지</button>
  </div>
</div>

<div class="card new">
  <span class="badge orange">새 후보 2</span>
  <h2>C. 두근두근 하트비트</h2>
  <p>"뚜둥~ 뚜뚜둥~" 심장 뛰는 것처럼 리듬감 있고 귀여운 소리.</p>
  <div class="btnRow">
    <button class="btn play" onclick="playC(this)">재생</button>
    <button class="btn stop" onclick="stopAll()">정지</button>
  </div>
</div>

<div class="card new">
  <span class="badge orange">새 후보 3</span>
  <h2>D. 물방울 마림바</h2>
  <p>마림바 같은 통통 튀는 물방울 소리. 밝고 장난스러운 느낌.</p>
  <div class="btnRow">
    <button class="btn play" onclick="playD(this)">재생</button>
    <button class="btn stop" onclick="stopAll()">정지</button>
  </div>
</div>

<p style="font-size:12px;color:rgba(255,255,255,.3);margin-top:16px">마음에 드는 걸 알려주세요! (A / B / C / D)</p>

<script>
var ctx = null;
var timer = null;

function getCtx() {
  if (ctx) { try { ctx.close(); } catch(e) {} }
  ctx = new (window.AudioContext || window.webkitAudioContext)();
  return ctx;
}

function stopAll() {
  if (timer) { clearTimeout(timer); timer = null; }
  if (ctx) { try { ctx.close(); } catch(e) {} ctx = null; }
  document.querySelectorAll('.btn.play').forEach(function(b) { b.classList.remove('playing'); b.textContent = '재생'; });
}

function markPlaying(btn) {
  document.querySelectorAll('.btn.play').forEach(function(b) { b.classList.remove('playing'); b.textContent = '재생'; });
  btn.classList.add('playing');
  btn.textContent = '재생 중...';
}

// A: 현재 적용된 한국식 콜백톤
function playA(btn) {
  stopAll();
  markPlaying(btn);
  var c = getCtx();
  function ring() {
    if (!ctx) return;
    var t = c.currentTime;
    [425, 480].forEach(function(freq) {
      var osc = c.createOscillator();
      var gain = c.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.06, t + 0.08);
      gain.gain.setValueAtTime(0.06, t + 1.0);
      gain.gain.linearRampToValueAtTime(0, t + 1.15);
      osc.connect(gain).connect(c.destination);
      osc.start(t);
      osc.stop(t + 1.2);
    });
    timer = setTimeout(ring, 3000);
  }
  ring();
}

// B: 따뜻한 트라이톤 멜로디
function playB(btn) {
  stopAll();
  markPlaying(btn);
  var c = getCtx();
  // 도-미-솔 올라갔다 미-도 내려오는 따뜻한 멜로디
  var melody = [
    {f:523,d:0.18}, {f:659,d:0.18}, {f:784,d:0.28},
    {f:0,d:0.08},
    {f:659,d:0.18}, {f:523,d:0.3}
  ];
  function ring() {
    if (!ctx) return;
    var t = c.currentTime;
    melody.forEach(function(note) {
      if (note.f > 0) {
        // 기본음
        var osc = c.createOscillator();
        var gain = c.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(note.f, t);
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.13, t + 0.03);
        gain.gain.setValueAtTime(0.13, t + note.d * 0.5);
        gain.gain.exponentialRampToValueAtTime(0.001, t + note.d);
        osc.connect(gain).connect(c.destination);
        osc.start(t);
        osc.stop(t + note.d + 0.05);
        // 옥타브 위 하모닉 (부드러운 윤기)
        var osc2 = c.createOscillator();
        var g2 = c.createGain();
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(note.f * 2, t);
        g2.gain.setValueAtTime(0, t);
        g2.gain.linearRampToValueAtTime(0.035, t + 0.03);
        g2.gain.exponentialRampToValueAtTime(0.001, t + note.d);
        osc2.connect(g2).connect(c.destination);
        osc2.start(t);
        osc2.stop(t + note.d + 0.05);
        // 5도 아래 하모닉 (따뜻함)
        var osc3 = c.createOscillator();
        var g3 = c.createGain();
        osc3.type = 'sine';
        osc3.frequency.setValueAtTime(note.f * 0.667, t);
        g3.gain.setValueAtTime(0, t);
        g3.gain.linearRampToValueAtTime(0.02, t + 0.03);
        g3.gain.exponentialRampToValueAtTime(0.001, t + note.d * 0.7);
        osc3.connect(g3).connect(c.destination);
        osc3.start(t);
        osc3.stop(t + note.d + 0.05);
      }
      t += note.d;
    });
    timer = setTimeout(ring, 3200);
  }
  ring();
}

// C: 두근두근 하트비트
function playC(btn) {
  stopAll();
  markPlaying(btn);
  var c = getCtx();
  // "뚜둥~ ... 뚜뚜둥~" 리듬
  var beats = [
    {f:587,d:0.12}, {f:440,d:0.22},
    {f:0,d:0.35},
    {f:587,d:0.1}, {f:659,d:0.1}, {f:440,d:0.28}
  ];
  function ring() {
    if (!ctx) return;
    var t = c.currentTime;
    beats.forEach(function(note) {
      if (note.f > 0) {
        var osc = c.createOscillator();
        var gain = c.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(note.f, t);
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.14, t + 0.015);
        gain.gain.setValueAtTime(0.14, t + note.d * 0.3);
        gain.gain.exponentialRampToValueAtTime(0.001, t + note.d);
        osc.connect(gain).connect(c.destination);
        osc.start(t);
        osc.stop(t + note.d + 0.05);
        // 부드러운 서브베이스 느낌
        var osc2 = c.createOscillator();
        var g2 = c.createGain();
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(note.f * 0.5, t);
        g2.gain.setValueAtTime(0, t);
        g2.gain.linearRampToValueAtTime(0.05, t + 0.015);
        g2.gain.exponentialRampToValueAtTime(0.001, t + note.d * 0.8);
        osc2.connect(g2).connect(c.destination);
        osc2.start(t);
        osc2.stop(t + note.d + 0.05);
      }
      t += note.d;
    });
    timer = setTimeout(ring, 2800);
  }
  ring();
}

// D: 물방울 마림바
function playD(btn) {
  stopAll();
  markPlaying(btn);
  var c = getCtx();
  var notes = [
    {f:1047,d:0.1}, {f:784,d:0.1}, {f:1047,d:0.1}, {f:1319,d:0.15},
    {f:0,d:0.1},
    {f:1175,d:0.1}, {f:1047,d:0.1}, {f:784,d:0.2}
  ];
  function ring() {
    if (!ctx) return;
    var t = c.currentTime;
    notes.forEach(function(note) {
      if (note.f > 0) {
        // 마림바 느낌: 빠른 어택 + 빠른 디케이
        var osc = c.createOscillator();
        var gain = c.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(note.f, t);
        osc.frequency.exponentialRampToValueAtTime(note.f * 0.98, t + note.d);
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.15, t + 0.005);
        gain.gain.exponentialRampToValueAtTime(0.001, t + note.d + 0.08);
        osc.connect(gain).connect(c.destination);
        osc.start(t);
        osc.stop(t + note.d + 0.1);
        // 높은 하모닉으로 "통통" 느낌
        var osc2 = c.createOscillator();
        var g2 = c.createGain();
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(note.f * 3, t);
        g2.gain.setValueAtTime(0, t);
        g2.gain.linearRampToValueAtTime(0.04, t + 0.003);
        g2.gain.exponentialRampToValueAtTime(0.001, t + note.d * 0.4);
        osc2.connect(g2).connect(c.destination);
        osc2.start(t);
        osc2.stop(t + note.d + 0.1);
      }
      t += note.d;
    });
    timer = setTimeout(ring, 2600);
  }
  ring();
}
</script>
</body>
</html>
